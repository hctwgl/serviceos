name: materialize-identity-governance-indexes

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'docs/m135-m140-identity-governance-roadmap'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update formal indexes and status
        run: python3 scripts/materialize-identity-governance-indexes.py

      - name: Validate patch formatting
        shell: bash
        run: |
          set -euo pipefail
          git diff --check

      - name: Record preflight diagnostics
        shell: bash
        run: |
          set +e
          bash scripts/verify-milestone-preflight.sh
          code=$?
          echo "preflight_exit_code=${code}"
          exit 0

      - name: Commit index updates
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Indexes are already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add AGENTS.md serviceos-architecture/README.md serviceos-architecture/docs/implementation-status.md
          git diff --cached --check
          git commit -m 'docs: register M135-M140 governance program'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
