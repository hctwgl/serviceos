apiVersion: 1

datasources:
  - name: ServiceOS Prometheus
    uid: serviceos-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: ServiceOS Tempo
    uid: serviceos-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToMetrics:
        datasourceUid: serviceos-prometheus
        tags:
          - key: service.name
            value: service
      serviceMap:
        datasourceUid: serviceos-prometheus
      nodeGraph:
        enabled: true
