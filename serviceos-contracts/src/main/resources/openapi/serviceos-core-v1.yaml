  /work-orders/{workOrderId}/pricing-snapshots:
    get:
      operationId: listWorkOrderPricingSnapshots
      summary: 读取工单影子定价试算快照（非结算）
      description: |
        只读返回 cfg_calculation_snapshot（mode=SHADOW）。需要 pricing.snapshot.read 与工单 Project Scope。
        无快照时返回空列表与 emptyHint；SQL 种子 FULFILLED 不会有快照。不提供结算、落账或进入结算写命令。
      parameters:
        - { name: workOrderId, in: path, required: true, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 影子试算快照列表
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema:
                type: object
                required: [workOrderId, items, queriedAt]
                properties:
                  workOrderId: { type: string, format: uuid }
                  items:
                    type: array
                    items:
                      type: object
                      required:
                        [snapshotId, workOrderId, projectId, sourceEventId, sourceEventType,
                         pricingKey, currency, totalAmountMinor, mode, correlationId, createdAt]
                      properties:
                        snapshotId: { type: string, format: uuid }
                        workOrderId: { type: string, format: uuid }
                        projectId: { type: string, format: uuid }
                        sourceEventId: { type: string, format: uuid }
                        sourceEventType: { type: string }
                        pricingKey: { type: string }
                        currency: { type: string }
                        totalAmountMinor: { type: integer, format: int64, minimum: 0 }
                        mode: { type: string, enum: [SHADOW] }
                        correlationId: { type: string }
                        createdAt: { type: string, format: date-time }
                  queriedAt: { type: string, format: date-time }
                  emptyHint: { type: string, nullable: true }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
