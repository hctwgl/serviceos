          type: string
          minLength: 1
          maxLength: 128
          description: 目标师傅 assignee（通常为 technicianProfileId）；不得携带 networkAssigneeId
        businessType: { type: string, minLength: 1, maxLength: 100 }
        reasonCode: { type: string, pattern: '^[A-Z][A-Z0-9_]{1,99}$' }
    ManualServiceAssignmentReceipt:
