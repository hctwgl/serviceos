          description: 修订后的完整 NETWORK 集合；空数组表示终止全部当前 NETWORK 关系
          items: { type: string, minLength: 1, maxLength: 128 }
        reason: { type: string, minLength: 1, maxLength: 500 }
    ProjectScopeRelationRevision:
      type: object
      additionalProperties: false
