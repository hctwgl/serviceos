  /me/followed-projects/{projectId}:
    delete:
      operationId: unfollowMyProject
      summary: 取消关注项目
      description: 即使已失权也可清理本人关注行；幂等成功。
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: portal
          in: query
          required: false
          schema: { type: string, enum: [ADMIN], default: ADMIN }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '204':
          description: 已取消关注
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
  /network-portal/work-orders:
    get:
      operationId: listNetworkPortalWorkOrders
      summary: Network Portal 本网点 ACTIVE 责任工单
      description: |
        M194：需要有效 NETWORK 门户上下文（X-Network-Context）与 NETWORK scope networkTask.read。
        仅返回该网点 ACTIVE NETWORK ServiceAssignment 对应工单；禁止 query-param networkId。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
        M230：可选 `technicians`（复用 NetworkPortalTechnicianItem）；
        需 NETWORK `technician.readOwnNetwork`，缺能力时省略（不得用空数组伪装）；
        仅含本页 items[].technicianId 命中的本网点 ACTIVE 师傅。
        M231：可选 `appointments`（复用 Admin/NP 预约摘要字段集）；
        需 NETWORK `networkPortal.manageAppointment`，缺能力时省略（不得用空数组伪装）；
        覆盖本页 items[].taskIds；另按可信 networkId 过滤 assignedNetworkId。
        M232：可选 `contactAttempts`（复用 Admin/NP 联系摘要字段集）；
        需 NETWORK `networkPortal.manageAppointment`，缺能力时省略（不得用空数组伪装）；
        覆盖本页 items[].taskIds。
        M233：可选 `corrections`（复用 Admin WorkOrderWorkspaceCorrectionCaseSummary）；
        需 NETWORK `evidence.read`，缺能力时省略（不得用空数组伪装）；
        覆盖本页 items[].taskIds；含全部状态。
        M234：可选 `slaRiskSummaries`（NetworkPortalDirectorySlaRiskSummary）；
        需 NETWORK `sla.read`，缺能力时省略（不得用空数组伪装）；
        按本页工单聚合 ACTIVE taskIds 的 open/breached；仅含 openCount>0 行。
        M235：可选 `evidenceSlots` / `evidenceItems`（复用 Admin 工作区摘要字段集）；
        需 NETWORK `evidence.read`，缺能力时同时省略（不得用空数组伪装）；
        覆盖本页 items[].taskIds。
        M236：items 含非 PII 工单头字段 brandCode/serviceProductCode/provinceCode/
        cityCode/districtCode/receivedAt（对齐 Admin WorkOrder 子集；工单缺失时为 null）。
        M428：items 含服务端脱敏客户联系 `maskedCustomerName` / `maskedCustomerPhone` /
        `maskedServiceAddress`（复用 M424 网点脱敏端口；随基座返回，不 soft-omit；无原文）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 本网点 ACTIVE 责任工单列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalWorkOrderPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/work-orders/{workOrderId}/workspace:
    get:
      operationId: getNetworkPortalWorkOrderWorkspace
      summary: Network Portal 限定工单工作区（薄快照）
      description: |
        M213：X-Network-Context + NETWORK scope networkTask.read。
        仅当 workOrderId 对本网点存在 ACTIVE NETWORK ServiceAssignment 时返回；
        否则 ACCESS_DENIED（改派后旧 URL 失败关闭）。**不**复用 Admin WorkOrderWorkspace；
        响应为安全薄 DTO（工单头 + 本网点 ACTIVE 任务摘要），不含 INTEGRATION/定价/PII。
        M221：可选 `slaSummary`（openCount/breachedCount）；需 NETWORK `sla.read`，
        缺能力时省略该属性（不得用 0 伪装无权限）；按本网点 ACTIVE taskIds 过滤。
        M222：可选 `visits` / `formSubmissions`（复用 Admin 工作区摘要字段集）；
        分别需 NETWORK `visit.read` / `form.read`，缺能力时省略属性（不得用空数组伪装）；
        Visit 另按可信 networkId 过滤；表单提交仅覆盖 ACTIVE taskIds。
        M223：可选 `evidenceSlots` / `evidenceItems`（复用 Admin 工作区摘要字段集）；
        需 NETWORK `evidence.read`，缺能力时同时省略两属性（不得用空数组伪装）；
        仅覆盖 ACTIVE taskIds；单任务未完成可靠解析时该任务贡献空结果（不抛冲突）。
        M225：可选 `corrections`（复用 Admin WorkOrderWorkspaceCorrectionCaseSummary）；
        需 NETWORK `evidence.read`，缺能力时省略（不得用空数组伪装）；仅覆盖 ACTIVE taskIds。
        M226：可选 `exceptions`（复用 NetworkPortalExceptionItem）；
        需 NETWORK `operations.exception.read`，缺能力时省略（不得用空数组伪装）；
        仅覆盖 ACTIVE taskIds；含全部状态。
        M227：可选 `appointments` / `contactAttempts`（复用 Admin 工作区摘要字段集）；
        需 NETWORK `networkPortal.manageAppointment`，缺能力时同时省略两属性
        （不得用空数组伪装）；仅覆盖 ACTIVE taskIds；预约另按可信 networkId 过滤
        assignedNetworkId。
        M228：可选 `technicians`（复用 NetworkPortalTechnicianItem）；
        需 NETWORK `technician.readOwnNetwork`，缺能力时省略（不得用空数组伪装）；
        仅含工作区头/tasks technicianId 命中的本网点 ACTIVE 师傅。
        M229：可选 `reviews`（复用 Admin WorkOrderWorkspaceReviewCaseSummary）；
        需 NETWORK `evidence.read`，缺能力时省略（不得用空数组伪装）；
        仅覆盖 ACTIVE taskIds；含全部状态。
        M424：顶层 `maskedCustomerName` / `maskedCustomerPhone` / `maskedServiceAddress`
        随基座返回（复用 workorder 脱敏端口的网点授权路径）；不得返回客户联系原文；
        不 soft-omit（缺值为 null）。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - name: workOrderId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 限定工单工作区薄快照
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalWorkOrderWorkspace' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /network-portal/tasks:
    get:
      operationId: listNetworkPortalTasks
      summary: Network Portal 本网点 ACTIVE 责任任务
      description: |
        M194：X-Network-Context + networkTask.read。数据范围同 work-orders，按任务展开。
        M230：可选 `technicians`（复用 NetworkPortalTechnicianItem）；
        需 NETWORK `technician.readOwnNetwork`，缺能力时省略（不得用空数组伪装）；
        仅含本页 items[].technicianId 命中的本网点 ACTIVE 师傅。
        M231：可选 `appointments`（复用 Admin/NP 预约摘要字段集）；
        需 NETWORK `networkPortal.manageAppointment`，缺能力时省略（不得用空数组伪装）；
        覆盖本页 items[].taskId；另按可信 networkId 过滤 assignedNetworkId。
        M232：可选 `contactAttempts`（复用 Admin/NP 联系摘要字段集）；
        需 NETWORK `networkPortal.manageAppointment`，缺能力时省略（不得用空数组伪装）；
        覆盖本页 items[].taskId。
        M233：可选 `corrections`（复用 Admin WorkOrderWorkspaceCorrectionCaseSummary）；
        需 NETWORK `evidence.read`，缺能力时省略（不得用空数组伪装）；
        覆盖本页 items[].taskId；含全部状态。
        M234：可选 `slaRiskSummaries`（NetworkPortalDirectorySlaRiskSummary）；
        需 NETWORK `sla.read`，缺能力时省略（不得用空数组伪装）；
        按本页 taskId 展开 open/breached；仅含 openCount>0 行。
        M235：可选 `evidenceSlots` / `evidenceItems`（复用 Admin 工作区摘要字段集）；
        需 NETWORK `evidence.read`，缺能力时同时省略（不得用空数组伪装）；
        覆盖本页 items[].taskId。
        M236：items 含非 PII 工单头字段 brandCode/serviceProductCode/provinceCode/
        cityCode/districtCode/receivedAt（对齐 Admin WorkOrder 子集；工单缺失时为 null）。
        M428：items 含所属工单服务端脱敏客户联系 `maskedCustomerName` / `maskedCustomerPhone` /
        `maskedServiceAddress`（复用 M424 网点脱敏端口；随基座返回，不 soft-omit；无原文）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 本网点 ACTIVE 责任任务列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalTaskPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/technicians:
    get:
      operationId: listNetworkPortalTechnicians
      summary: Network Portal 本网点师傅列表
      description: |
        M194：X-Network-Context + technician.readOwnNetwork。仅 ACTIVE NetworkTechnicianMembership。
        M421：items 含开放任务数与资质计数/摘要（口径对齐 assign-candidates；不伪造技能/服务区域）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 本网点 ACTIVE 师傅列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalTechnicianPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/tasks/{taskId}/assign-candidates:
    get:
      operationId: listNetworkPortalAssignCandidates
      summary: Network Portal 任务分配师傅候选摘要
      description: |
        M407/M408/M410/M412：X-Network-Context + networkTask.read + technician.readOwnNetwork。
        返回本网点 ACTIVE 师傅的开放任务数、资质摘要、预约日程冲突摘要、行政区距离亲和、
        推荐解释档位/摘要、网点产能口径与可分配警告。距离以工单省市区与网点 Coverage 亲和表达，
        不伪造经纬度路网距离；推荐解释依据可见运营事实，不含内部评分公式。
        任务须属于本网点 ACTIVE NETWORK 责任。
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 分配候选摘要页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalAssignCandidatePage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/technician-memberships:
    get:
      operationId: listNetworkPortalTechnicianMemberships
      summary: Network Portal 本网点师傅关系列表
      description: |
        M206：X-Network-Context + NETWORK scope technician.readOwnNetwork。
        仅返回 serviceNetworkId = 上下文网点的 NetworkTechnicianMembership 安全摘要（含 version，供 terminate If-Match）。
        可选 status（默认 ACTIVE）、technicianProfileId、limit（1～100，默认 50）；按 createdAt/id 正序。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
        - name: status
          in: query
          schema: { enum: [ACTIVE, TERMINATED], default: ACTIVE }
        - name: technicianProfileId
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: 本网点师傅关系列表页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalMembershipPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createNetworkPortalTechnicianMembership
      summary: Network Portal 绑定本网点师傅服务关系
      description: |
        M204：X-Network-Context + NETWORK scope networkPortal.manageTechnician。
        请求体不含 networkId；服务端强制等于可信上下文网点。
        委托 M185 createNetworkTechnicianMembership；底层 network.manageTechnician 按 NETWORK 收窄。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NetworkPortalCreateTechnicianMembershipRequest' }
      responses:
        '200':
          description: 已创建 ACTIVE 关系或幂等回放
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkTechnicianMembership' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /network-portal/technician-memberships/{membershipId}:
    get:
      operationId: getNetworkPortalTechnicianMembership
      summary: Network Portal 本网点师傅关系详情
      description: |
        M206：X-Network-Context + NETWORK scope technician.readOwnNetwork。
        serviceNetworkId 必须等于上下文网点，否则 ACCESS_DENIED；含真实 version。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - $ref: '#/components/parameters/NetworkTechnicianMembershipId'
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 师傅关系安全摘要
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalMembershipItem' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /network-portal/technician-memberships/{membershipId}:terminate:
    post:
      operationId: terminateNetworkPortalTechnicianMembership
      summary: Network Portal 终止本网点师傅服务关系
      description: |
        M204：X-Network-Context + NETWORK scope networkPortal.manageTechnician + If-Match。
        membership 必须属于上下文网点，否则 ACCESS_DENIED。
        委托 M185 terminateNetworkTechnicianMembership。
