        capabilityCodes: { type: array, items: { type: string, minLength: 1, maxLength: 120 } }
        contextVersion: { type: string, minLength: 1, maxLength: 120 }
        asOf: { type: string, format: date-time }
    MeNavigationItem:
      type: object
      additionalProperties: false
