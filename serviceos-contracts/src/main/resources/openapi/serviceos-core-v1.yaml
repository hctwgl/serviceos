        以及 APPOINTMENTS_VISITS 等 sectionAvailability。不含客户 PII；大区块按需加载见
        workspace/sections（M87～M94：TASKS/TIMELINE_AUDIT/APPOINTMENTS_VISITS/FORMS_EVIDENCE/
        REVIEWS_CORRECTIONS/INTEGRATION）。
