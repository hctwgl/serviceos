          $ref: '#/components/schemas/NetworkPortalWorkOrderWorkspaceSlaSummary'
        todayAppointmentCount:
          type: integer
          minimum: 0
          description: |
            M411：Asia/Shanghai 运营日内与 ACTIVE 任务窗口重叠的 PROPOSED/CONFIRMED 预约数；
