        nextCursor: { type: [string, 'null'] }
        asOf: { type: string, format: date-time }
    StableProjectScopeReferences:
      type: array
      maxItems: 100
      uniqueItems: true
      items: { type: string, minLength: 1, maxLength: 128 }
    CompleteHumanTaskRequest:
      type: object
      additionalProperties: false
      required: [resultRef, resultDigest]
      properties:
        resultRef:
          type: string
          minLength: 1
          maxLength: 500
          description: >-
            表单或双引用 Task 使用 form-submission://{submissionId}；
            无 formRef 的资料 Task 使用 evidence-set-snapshot://{snapshotId}；
            其他非表单/资料 Task 使用所属领域稳定引用
        resultDigest:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: >-
            表单或双引用 Task 必须等于 FormSubmission contentDigest；
            资料-only Task 必须等于 EvidenceSetSnapshot contentDigest
        inputVersionRefs:
          type: array
          maxItems: 8
          description: 双引用 Task 必填；表单-only / 资料-only 必须省略或为空
          items:
            $ref: '#/components/schemas/InputVersionRef'
    InputVersionRef:
      type: object
      additionalProperties: false
      required: [kind, ref, digest]
      properties:
        kind: { enum: [FORM_SUBMISSION, EVIDENCE_SET_SNAPSHOT] }
        ref: { type: string, minLength: 1, maxLength: 500 }
        digest: { type: string, pattern: '^[0-9a-f]{64}$' }
    AssignTaskCandidatesRequest:
      type: object
      additionalProperties: false
      required: [candidatePrincipalIds, sourceType, sourceId]
      properties:
        candidatePrincipalIds:
