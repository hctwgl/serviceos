        configurationBundleDigest, provinceCode, cityCode, districtCode, externalDispatchedAt,
        receivedAt, updatedAt, version, maskedCustomerName, maskedCustomerPhone, maskedServiceAddress,
        currentStageCode, currentClaimedBy, currentAssigneeDisplayName]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string }
        projectId: { type: string, format: uuid }
        clientCode: { type: string }
        brandCode: { type: string }
        serviceProductCode: { type: string }
        externalOrderCode: { type: string }
        status: { enum: [RECEIVED, ACTIVE, FULFILLED] }
        configurationBundleId: { type: string, format: uuid }
        configurationBundleCode: { type: string }
        configurationBundleVersion: { type: string }
        configurationBundleDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        provinceCode: { type: string }
        cityCode: { type: string }
        districtCode: { type: string }
        externalDispatchedAt: { type: string, format: date-time }
        receivedAt: { type: string, format: date-time }
        updatedAt:
          type: string
          format: date-time
          description: >
            M435：工单聚合最近一次写路径更新时间（wo_work_order.updated_at），与 receivedAt 独立。
            目录「更新时间」列使用本字段，不得再映射 receivedAt。
        activatedAt: { type: [string, 'null'], format: date-time }
        fulfilledAt: { type: [string, 'null'], format: date-time }
        version: { type: integer, format: int64, minimum: 1 }
        maskedCustomerName:
          type: [string, 'null']
          maxLength: 64
          description: M429：服务端脱敏客户姓名；随目录/详情基座返回，不 soft-omit
        maskedCustomerPhone:
          type: [string, 'null']
          maxLength: 32
          description: M429：服务端脱敏手机号；不得返回完整号码
        maskedServiceAddress:
          type: [string, 'null']
          maxLength: 200
          description: M429：服务端脱敏服务地址；不得返回完整地址
        currentStageCode:
          type: [string, 'null']
          maxLength: 100
          description: >
            M432：当前阶段码，与工作区 currentTaskSummary.stageCode 同口径
            （首个 ACTIVE 任务：READY/PENDING/CLAIMED/RUNNING/RETRY_WAIT/MANUAL_INTERVENTION）。
            无 ACTIVE 任务时为 null；不发明阶段名。
        currentClaimedBy:
          type: [string, 'null']
          maxLength: 128
          description: >
            M433：当前 ACTIVE 任务认领主体 ID（tsk_task.claimed_by）；未认领或无 ACTIVE 任务时为 null。
        currentAssigneeDisplayName:
          type: [string, 'null']
          maxLength: 128
          description: >
            M433：认领主体 Persona 显示名；无认领或无 PersonProfile 时为 null，不发明名称。
