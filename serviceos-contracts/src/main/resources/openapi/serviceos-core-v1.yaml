        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/NetworkReasonRequest' } } }
      responses:
        '200':
          description: 已终止关系或幂等回放
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkTechnicianMembership' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
