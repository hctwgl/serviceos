              schema: { $ref: '#/components/schemas/ConfigurationDraft' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /configuration/drafts/{draftId}:publish:
    post:
      operationId: publishConfigurationDraft
      summary: 发布已审批配置草稿
      description: 需要 configuration.publish（HIGH）；仅 APPROVED 可发布，生成不可变资产版本。
      parameters:
        - name: draftId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 已发布草稿（含 publishedVersionId）
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfigurationDraft' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /configuration/bundle-activations:
    get:
      operationId: listBundleChannelActivations
      summary: 列出项目 Bundle 通道激活
      description: 需要 configuration.release.manage。
      parameters:
        - name: projectId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 激活历史（新到旧）
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/BundleChannelActivation' } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: activateBundleChannel
      summary: 激活 STABLE/CANARY 通道
      description: 需要 configuration.release.manage；指向已发布 Bundle，不修改 Bundle 内容。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivateBundleChannelRequest' }
      responses:
        '200':
          description: 新 ACTIVE 激活
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BundleChannelActivation' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /configuration/bundle-activations/{activationId}:adjust-traffic:
    post:
      operationId: adjustCanaryTraffic
      summary: 调整 ACTIVE CANARY 槽位流量
      description: 可设 autoPromoteWhenFull；调至 100% 时自动晋级并停用其它 CANARY 槽位。
      parameters:
        - name: activationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdjustCanaryTrafficRequest' }
      responses:
        '200':
          description: 调整后的激活（或晋级后的 STABLE）
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BundleChannelActivation' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /configuration/bundle-activations/{activationId}:promote:
    post:
      operationId: promoteCanaryBundleActivation
      summary: 将 ACTIVE CANARY 晋级为 STABLE
      parameters:
        - name: activationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BundleActivationApprovalRequest' }
      responses:
        '200':
          description: 新 STABLE 激活
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BundleChannelActivation' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /configuration/bundle-activations/{activationId}:rollback:
    post:
      operationId: rollbackStableBundleActivation
      summary: 回滚 ACTIVE STABLE 到上一激活
      parameters:
        - name: activationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BundleActivationApprovalRequest' }
      responses:
        '200':
          description: 回滚后的 STABLE 激活
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BundleChannelActivation' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /configuration/bundle-activations/{activationId}:deactivate:
    post:
      operationId: deactivateBundleChannelActivation
      summary: 停用 ACTIVE STABLE/CANARY 通道激活
      description: |
        将激活置为 SUPERSEDED；不自动回滚、不猜测下一激活。
        项目一旦进入通道模型，停用后若无 ACTIVE STABLE/CANARY，解析失败关闭。
      parameters:
        - name: activationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BundleActivationApprovalRequest' }
      responses:
        '200':
          description: 已停用激活
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BundleChannelActivation' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 由受信 OIDC 提供方签发，必须包含 subject、tenant_id；token 中的能力声明不能替代 ServiceOS RoleGrant。
  parameters:
    PrincipalId:
      name: principalId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrgUnitId:
      name: orgUnitId
      in: path
      required: true
      schema: { type: string, format: uuid }
    MembershipId:
      name: membershipId
      in: path
      required: true
      schema: { type: string, format: uuid }
    DirectorySyncBatchId:
      name: batchId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PartnerOrganizationId:
      name: partnerOrganizationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ServiceNetworkId:
      name: networkId
      in: path
      required: true
      schema: { type: string, format: uuid }
    NetworkMembershipId:
      name: membershipId
      in: path
      required: true
      schema: { type: string, format: uuid }
    NetworkTechnicianMembershipId:
      name: membershipId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TechnicianProfileId:
      name: profileId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TechnicianQualificationId:
      name: qualificationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RoleId:
      name: roleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    GrantId:
      name: grantId
      in: path
      required: true
      schema: { type: string, format: uuid }
    DelegationId:
      name: delegationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CorrectionCaseId:
      name: correctionCaseId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OperationalExceptionId:
      name: exceptionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SlaInstanceId:
      name: slaInstanceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AppointmentId:
      name: appointmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VisitId:
      name: visitId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ContactAttemptId:
      name: contactAttemptId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    ClientKind:
      name: X-ServiceOS-Client-Kind
      in: header
      required: false
      description: |
        用于客户端兼容门禁与低基数可观测性；不参与身份认证或 Tenant/Project Scope 判定。
        已知 TECHNICIAN_* / NETWORK_WEB 在对应 Portal 写路径上参与 ClientCapability 校验。
      schema: { enum: [ADMIN_WEB, NETWORK_WEB, TECHNICIAN_WEB, TECHNICIAN_IOS] }
    ClientVersion:
      name: X-ServiceOS-Client-Version
      in: header
      required: false
      description: 客户端发布版本；缺失或非法时服务端记录有界哨兵，不回显不可信原文。
      schema:
        type: string
        pattern: '^[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]{1,32})?$'
        maxLength: 64
    NetworkContext:
      name: X-Network-Context
      in: header
      required: true
      description: |
        M194：M188 contextId 形态 `NETWORK|NETWORK|{uuid}`，或经 ACTIVE NetworkMembership
        校验后的纯 network UUID。不得用查询参数代替。
      schema:
        type: string
        minLength: 36
        maxLength: 80
    TechnicianContext:
      name: X-Technician-Context
      in: header
      required: true
      description: |
        M195：M188 contextId 形态 `TECHNICIAN|NETWORK|{uuid}`，或经 ACTIVE
        NetworkTechnicianMembership 校验后的纯 network UUID。不得用查询参数代替。
      schema:
        type: string
        minLength: 36
        maxLength: 96
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 双引号包裹的正整数聚合版本，例如 `"3"`。
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
  schemas:
    CreateConfigurationDraftRequest:
      type: object
      additionalProperties: false
      required: [assetType, assetKey, intendedSemanticVersion, schemaVersion, definitionJson]
      properties:
        assetType: { type: string, enum: [WORKFLOW, FORM, EVIDENCE, SLA, RULE, DISPATCH, NOTIFICATION, ASSIGNEE_POLICY, INTEGRATION, PRICING] }
        assetKey: { type: string, minLength: 1, maxLength: 128 }
        intendedSemanticVersion: { type: string, minLength: 1, maxLength: 64 }
        schemaVersion: { type: string, minLength: 1, maxLength: 64 }
        definitionJson: { type: string, minLength: 2, maxLength: 1000000 }
        baseVersionId: { type: [string, 'null'], format: uuid }
        supportedClientKinds:
          type: [array, 'null']
          description: |
            M358：FORM/EVIDENCE 定向发布目标客户端。省略或 null 表示全部生产师傅端（M356 默认）；
            非空时仅对声明集合做并集阻断，且集合内每一端必须完全兼容。
          minItems: 1
          uniqueItems: true
          items: { type: string, enum: [TECHNICIAN_WEB, TECHNICIAN_IOS] }
    UpdateConfigurationDraftRequest:
      type: object
      additionalProperties: false
      required: [definitionJson]
      properties:
        definitionJson: { type: string, minLength: 2, maxLength: 1000000 }
        supportedClientKinds:
          type: [array, 'null']
          description: |
            省略则保留原值；空数组清除为全端默认；非空覆盖定向目标。
          uniqueItems: true
          items: { type: string, enum: [TECHNICIAN_WEB, TECHNICIAN_IOS] }
    ApproveConfigurationDraftRequest:
      type: object
      additionalProperties: false
      required: [approvalRef]
      properties:
        approvalRef: { type: string, minLength: 1, maxLength: 128 }
    ActivateBundleChannelRequest:
      type: object
      additionalProperties: false
      required: [projectId, channel, bundleId, approvalRef]
      properties:
        projectId: { type: string, format: uuid }
        channel: { type: string, enum: [STABLE, CANARY] }
        bundleId: { type: string, format: uuid }
        approvalRef: { type: string, minLength: 1, maxLength: 128 }
        trafficPercent:
          type: [integer, 'null']
          minimum: 0
          maximum: 100
          description: CANARY 分流百分比；省略时 CANARY 默认 0，STABLE 固定 100。
        slotCode:
          type: [string, 'null']
          pattern: '^[a-z][a-z0-9_-]{0,63}$'
          description: CANARY 槽位名；STABLE 固定 primary。
        autoPromoteWhenFull:
          type: [boolean, 'null']
          description: CANARY 以 100% 激活时是否立即晋级 STABLE。
    AdjustCanaryTrafficRequest:
      type: object
      additionalProperties: false
      required: [trafficPercent]
      properties:
        trafficPercent: { type: integer, minimum: 0, maximum: 100 }
        autoPromoteWhenFull: { type: [boolean, 'null'] }
    BundleActivationApprovalRequest:
      type: object
      additionalProperties: false
      required: [approvalRef]
      properties:
        approvalRef: { type: string, minLength: 1, maxLength: 128 }
    BundleChannelActivation:
      type: object
      additionalProperties: false
      required: [activationId, projectId, channel, slotCode, bundleId, bundleCode, bundleVersion,
                 status, approvalRef, trafficPercent, activatedBy, activatedAt, aggregateVersion]
      properties:
        activationId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        channel: { type: string, enum: [STABLE, CANARY] }
        slotCode: { type: string }
        bundleId: { type: string, format: uuid }
        bundleCode: { type: string }
        bundleVersion: { type: string }
        previousActivationId: { type: [string, 'null'], format: uuid }
        status: { enum: [ACTIVE, SUPERSEDED] }
        approvalRef: { type: string }
        trafficPercent: { type: integer, minimum: 0, maximum: 100 }
        activatedBy: { type: string }
        activatedAt: { type: string, format: date-time }
        supersededAt: { type: [string, 'null'], format: date-time }
        aggregateVersion: { type: integer, format: int64, minimum: 1 }
    AnalyzeConfigurationDependenciesRequest:
      type: object
      additionalProperties: false
      required: [assetType, definitionJson]
      properties:
        assetType: { type: string, enum: [WORKFLOW] }
        assetKey: { type: [string, 'null'] }
        definitionJson: { type: string }
        bundleId: { type: [string, 'null'], format: uuid }
    ConfigurationDependencyReport:
      type: object
      additionalProperties: false
      required: [assetType, assetKey, complete, dependencies]
      properties:
        assetType: { type: string, enum: [WORKFLOW] }
        assetKey: { type: string }
        draftId: { type: [string, 'null'], format: uuid }
        bundleId: { type: [string, 'null'], format: uuid }
        complete: { type: boolean }
        dependencies:
          type: array
          items: { $ref: '#/components/schemas/ConfigurationDependencyItem' }
    ConfigurationDependencyItem:
      type: object
      additionalProperties: false
      required: [refField, refValue, expectedAssetType, status, detail]
      properties:
        refField: { type: string }
        refValue: { type: string }
        sourceNodeId: { type: [string, 'null'] }
        expectedAssetType:
          type: string
          enum: [WORKFLOW, FORM, EVIDENCE, RULE, SLA, DISPATCH, PRICING, INTEGRATION, ASSIGNEE_POLICY, NOTIFICATION]
        status: { type: string, enum: [SATISFIED, MISSING, UNKNOWN_TYPE] }
        satisfiedVersionId: { type: [string, 'null'], format: uuid }
        detail: { type: string }
    SimulateConfigurationRequest:
      type: object
      additionalProperties: false
      properties:
        context: { $ref: '#/components/schemas/ConfigurationSimulationContext' }
        maxSteps: { type: integer, minimum: 1, maximum: 256 }
    RunConfigurationSimulationRequest:
      type: object
      additionalProperties: false
      required: [assetType, definitionJson]
      properties:
        assetType: { type: string, enum: [WORKFLOW] }
        assetKey: { type: [string, 'null'] }
        definitionJson: { type: string }
        context: { $ref: '#/components/schemas/ConfigurationSimulationContext' }
        maxSteps: { type: integer, minimum: 1, maximum: 256 }
    ConfigurationSimulationContext:
      type: object
      additionalProperties: false
      properties:
        workOrder:
          type: object
          additionalProperties: false
          properties:
            clientCode: { type: [string, 'null'] }
            brandCode: { type: [string, 'null'] }
            serviceProductCode: { type: [string, 'null'] }
        region:
          type: object
          additionalProperties: false
          properties:
            provinceCode: { type: [string, 'null'] }
            cityCode: { type: [string, 'null'] }
            districtCode: { type: [string, 'null'] }
        task:
          type: object
          additionalProperties: false
          properties:
            stageCode: { type: [string, 'null'] }
            taskType: { type: [string, 'null'] }
        formValues:
          type: object
          additionalProperties: true
    ConfigurationSimulationReport:
      type: object
      additionalProperties: false
      required: [assetType, assetKey, outcome, message, steps]
      properties:
        assetType: { type: string, enum: [WORKFLOW] }
        assetKey: { type: string }
        draftId: { type: [string, 'null'], format: uuid }
        outcome: { type: string, enum: [COMPLETED, WAITING, FAIL_CLOSED, STEP_LIMIT] }
        message: { type: string }
        steps:
          type: array
          items: { $ref: '#/components/schemas/ConfigurationSimulationStep' }
    ConfigurationSimulationStep:
      type: object
      additionalProperties: false
      required: [index, nodeId, nodeType, action, detail]
      properties:
        index: { type: integer }
        nodeId: { type: string }
        nodeType: { type: string }
        action: { type: string }
        detail: { type: string }
    RunConfigurationHistoricalReplayRequest:
      type: object
      additionalProperties: false
      required: [bundleId]
      properties:
        bundleId: { type: string, format: uuid }
        workflowAssetKey: { type: [string, 'null'] }
        context: { $ref: '#/components/schemas/ConfigurationSimulationContext' }
        maxSteps: { type: integer, minimum: 1, maximum: 256 }
    ConfigurationHistoricalReplayReport:
      type: object
      additionalProperties: false
      required: [bundleId, bundleCode, bundleVersion, manifestDigest, workflowVersionId,
                 workflowAssetKey, workflowSemanticVersion, outcome, message, steps]
      properties:
        bundleId: { type: string, format: uuid }
        bundleCode: { type: string }
        bundleVersion: { type: string }
        manifestDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        workflowVersionId: { type: string, format: uuid }
        workflowAssetKey: { type: string }
        workflowSemanticVersion: { type: string }
        outcome: { type: string, enum: [COMPLETED, WAITING, FAIL_CLOSED, STEP_LIMIT] }
        message: { type: string }
        steps:
          type: array
          items: { $ref: '#/components/schemas/ConfigurationSimulationStep' }
    ConfigurationDraftDiff:
      type: object
      additionalProperties: false
      required: [draftId, baseLabel, draftLabel, unifiedDiff, identical]
      properties:
        draftId: { type: string, format: uuid }
        baseVersionId: { type: [string, 'null'], format: uuid }
        baseLabel: { type: string }
        draftLabel: { type: string }
        unifiedDiff: { type: string }
        identical: { type: boolean }
    ConfigurationTaskTemplateItem:
      type: object
      required:
        - templateKey
        - templateName
        - taskTypeCode
        - category
        - categoryLabel
        - executionRoleLabel
        - status
        - statusLabel
        - referencedWorkflowCount
        - referencedWorkflowNames
        - gaps
      properties:
        templateKey: { type: string }
        templateName: { type: string }
        taskTypeCode: { type: string }
        category:
          enum: [INTAKE, DISPATCH, APPOINTMENT, SURVEY, INSTALL, REVIEW, CORRECTION, FOLLOW_UP, SYSTEM]
        categoryLabel: { type: string }
        executionRoleLabel: { type: string }
        assignmentStrategyLabel: { type: string, nullable: true }
        formSummary: { type: string, nullable: true }
        evidenceSummary: { type: string, nullable: true }
        slaSummary: { type: string, nullable: true }
        status: { enum: [DRAFT, PUBLISHED] }
        statusLabel: { type: string }
        referencedWorkflowCount: { type: integer, minimum: 0 }
        referencedWorkflowNames:
          type: array
          items: { type: string }
        lastUpdatedAt: { type: string, format: date-time, nullable: true }
        gaps:
          type: array
          items: { type: string }
          description: 仍缺服务端产品字段时的诚实缺口说明
    ConfigurationDraft:
      type: object
      additionalProperties: false
      required: [draftId, assetType, assetKey, intendedSemanticVersion, schemaVersion,
                 definitionJson, contentDigest, status, validationErrors, aggregateVersion,
                 createdBy, updatedBy, createdAt, updatedAt]
      properties:
        draftId: { type: string, format: uuid }
        assetType: { type: string, enum: [WORKFLOW, FORM, EVIDENCE, SLA, RULE, DISPATCH, NOTIFICATION, ASSIGNEE_POLICY, INTEGRATION, PRICING] }
        assetKey: { type: string }
        intendedSemanticVersion: { type: string }
        schemaVersion: { type: string }
        definitionJson: { type: string }
        contentDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
