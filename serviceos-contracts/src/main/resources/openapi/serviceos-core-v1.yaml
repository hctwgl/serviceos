        请求体含 technicianAssigneeId、businessType、reasonCode；不含 networkAssigneeId。
        要求已有 ACTIVE NETWORK=上下文网点与不同 ACTIVE TECHNICIAN；委托 ManualReassign
        （ServiceAssignment prepare supersedes → confirm → activate → complete）。
        无 ACTIVE TECHNICIAN 时返回 VALIDATION_FAILED（应使用 assign-technician）。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
