      operationId: submitNetworkPortalTechnicianQualification
      summary: Network Portal 提交本网点师傅资质（PENDING）
      description: |
        M204：X-Network-Context + NETWORK scope networkPortal.manageTechnician。
        师傅必须对本网点持有 ACTIVE NetworkTechnicianMembership，否则 VALIDATION_FAILED。
        委托 M185 submitQualification；状态恒为 PENDING，网点不能自批。
      parameters:
