      description: |
        产品可用性：X-Network-Context + NETWORK scope networkPortal.acceptAssignment。
        仅激活 ACTIVE NETWORK；请求体不含 networkAssigneeId；服务端强制等于可信上下文网点。
        已有相同网点 ACTIVE NETWORK 时幂等回放；其他网点 ACTIVE 返回 SERVICE_ASSIGNMENT_CONFLICT（409）。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
