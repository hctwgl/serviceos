    SavedViewFilterClause:
      type: object
      additionalProperties: false
      required: [field, operator, value]
      properties:
        field: { type: string, minLength: 1, maxLength: 64 }
        operator: { enum: [EQ] }
        value: { type: string, minLength: 1, maxLength: 200 }
    SavedViewFilterAst:
      type: object
      additionalProperties: false
      required: [clauses]
      properties:
        clauses: { type: array, items: { $ref: '#/components/schemas/SavedViewFilterClause' } }
    SavedViewSortField:
      type: object
      additionalProperties: false
      required: [field, direction]
      properties:
        field: { type: string, minLength: 1, maxLength: 64 }
        direction: { enum: [ASC, DESC] }
    SavedViewSortSpec:
      type: object
      additionalProperties: false
      required: [fields]
      properties:
        fields: { type: array, items: { $ref: '#/components/schemas/SavedViewSortField' } }
    SavedView:
      type: object
      additionalProperties: false
      required: [id, ownerPrincipalId, portal, pageId, name, visibility, schemaVersion, filter, isDefault, aggregateVersion, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        ownerPrincipalId: { type: string, minLength: 1, maxLength: 128 }
        portal: { enum: [ADMIN] }
        pageId: { enum: [ADMIN.TASK.QUEUE, ADMIN.WORKORDER.LIST, ADMIN.CORRECTION.QUEUE] }
        name: { type: string, minLength: 1, maxLength: 120 }
        visibility: { enum: [PRIVATE, ROLE, TENANT] }
        sharedScopeRef:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 128
            - type: 'null'
        schemaVersion: { type: integer, minimum: 1 }
        filter: { $ref: '#/components/schemas/SavedViewFilterAst' }
        sort: { oneOf: [{ $ref: '#/components/schemas/SavedViewSortSpec' }, { type: 'null' }] }
        columns:
          oneOf:
            - type: array
              items: { type: string, minLength: 1, maxLength: 64 }
            - type: 'null'
        isDefault: { type: boolean }
        aggregateVersion: { type: integer, format: int64, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SavedViewPage:
      type: object
      additionalProperties: false
      required: [items, asOf]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SavedView' } }
        asOf: { type: string, format: date-time }
    ControlledSearchHit:
