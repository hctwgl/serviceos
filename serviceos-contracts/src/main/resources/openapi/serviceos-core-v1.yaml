        委托已 Implemented 的 contact-attempts 写入（底层另需 appointment.recordContact）；
        复用 M197 能力种子，无新 Flyway。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecordContactAttemptRequest' }
      responses:
        '201':
          description: 已记录的不可变联系事实
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
            Location:
              required: true
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContactAttempt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /network-portal/tasks/{taskId}/evidence-slots/{slotId}/upload-sessions:
    post:
      operationId: beginNetworkPortalEvidenceUploadOnBehalf
      summary: Network Portal 代师傅 Begin 资料上传
      description: |
        M201：X-Network-Context + NETWORK scope evidence.submitOnBehalf。
        Body 含 BeginEvidence 字段与权威 onBehalfOf/onBehalfReason；captureMetadata 内伪造
        onBehalfOf/delegationRef/onBehalfReason 仍失败关闭。
        要求任务存在未关闭 CorrectionCase，且 onBehalfOf = ACTIVE TECHNICIAN 且为本网点 ACTIVE 师傅。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
        M368 / ADR-089：要求 X-ServiceOS-Client-Kind=NETWORK_WEB，并对源 Task EVIDENCE 槽位做
        网点端能力门禁；不兼容或非 NETWORK_WEB 返回 422 CLIENT_CAPABILITY_UNSUPPORTED。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/ClientKind'
        - $ref: '#/components/parameters/ClientVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NetworkPortalBeginEvidenceUploadRequest' }
      responses:
        '201':
          description: 上传会话创建或幂等重放成功
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceUploadSession' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /network-portal/tasks/{taskId}/evidence-slots/{slotId}/upload-sessions/{uploadSessionId}:finalize:
    post:
      operationId: finalizeNetworkPortalEvidenceUploadOnBehalf
      summary: Network Portal 代师傅 Finalize 资料上传
      description: |
        M201：X-Network-Context + NETWORK scope evidence.submitOnBehalf。
        Body 与 FinalizeEvidenceUploadRequest 同形；会话 createdBy 必须为当前主体。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
        M368 / ADR-089：要求 NETWORK_WEB 客户端能力门禁；不兼容返回 422 CLIENT_CAPABILITY_UNSUPPORTED。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: uploadSessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/ClientKind'
        - $ref: '#/components/parameters/ClientVersion'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FinalizeEvidenceUploadRequest' }
      responses:
        '201':
          description: EvidenceItem 与 Revision 已创建或幂等重放
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceItem' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '410': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /network-portal/correction-cases:
    get:
      operationId: listNetworkPortalCorrectionCases
      summary: Network Portal 本网点整改队列
      description: |
        M202：X-Network-Context + NETWORK scope evidence.read。
        仅返回该网点 ACTIVE NETWORK ServiceAssignment 任务上的 CorrectionCase 安全摘要；
        默认 status=OPEN；按 createdAt/correctionCaseId 正序，内存 limit（1～100，默认 50）。
        不接受 Admin 项目范围 cursor 语义。上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
        - name: status
          in: query
          schema: { enum: [OPEN, IN_PROGRESS, RESUBMITTED, CLOSED, WAIVED], default: OPEN }
        - name: taskId
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: 本网点整改队列页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalCorrectionPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/correction-cases/{correctionCaseId}:
    get:
      operationId: getNetworkPortalCorrectionCase
      summary: Network Portal 本网点整改详情
      description: |
        M202：X-Network-Context + NETWORK scope evidence.read。
        委托 CorrectionCase.get 后校验 ACTIVE NETWORK 责任等于上下文网点；跨网点 ACCESS_DENIED。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - name: correctionCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: CorrectionCase 详情
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/CorrectionCase' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /network-portal/operational-exceptions:
    get:
      operationId: listNetworkPortalOperationalExceptions
      summary: Network Portal 本网点运营异常队列
      description: |
        M203：X-Network-Context + NETWORK scope operations.exception.read。
        仅返回该网点 ACTIVE NETWORK ServiceAssignment 任务上的 OperationalException 安全摘要；
        默认 status=OPEN；可选 severity；按 openedAt/exceptionId 正序，内存 limit（1～100，默认 50）。
        Portal allowedActions 恒为空；不接受 Admin 项目范围 cursor 语义与 Portal ACK/resolve。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
        - name: status
          in: query
          schema: { enum: [OPEN, ACKNOWLEDGED, RESOLVED], default: OPEN }
        - name: taskId
          in: query
          schema: { type: string, format: uuid }
        - name: severity
          in: query
          schema: { enum: [P0, P1, P2, P3] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: 本网点运营异常队列页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalExceptionPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/operational-exceptions/{exceptionId}:
    get:
      operationId: getNetworkPortalOperationalException
      summary: Network Portal 本网点运营异常详情
      description: |
        M203：X-Network-Context + NETWORK scope operations.exception.read。
        委托 OperationalExceptionWorkbench.get 后校验 ACTIVE NETWORK 责任等于上下文网点；
        跨网点 ACCESS_DENIED。Portal allowedActions 恒为空。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - name: exceptionId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 运营异常安全摘要
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalExceptionItem' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /network-portal/correction-cases/{correctionCaseId}:resubmit:
    post:
      operationId: resubmitNetworkPortalCorrectionCase
      summary: Network Portal 整改补传 resubmit
      description: |
        M201：X-Network-Context + NETWORK scope evidence.submitOnBehalf 门禁后，
        委托 CorrectionCase.resubmit（底层另需 evidence.submit）；整改任务须为本网点 ACTIVE NETWORK。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
        M368 / ADR-089：要求 NETWORK_WEB 客户端能力门禁；不兼容返回 422 CLIENT_CAPABILITY_UNSUPPORTED。
      parameters:
        - name: correctionCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/NetworkContext'
