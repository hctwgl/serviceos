        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateEvidenceSetSnapshotRequest' }
      responses:
        '201':
          description: EvidenceSetSnapshot 已创建
          headers:
            Location: { schema: { type: string, format: uri } }
            X-Correlation-Id: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceSetSnapshot' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /evidence-set-snapshots/{snapshotId}:
    get:
      operationId: getEvidenceSetSnapshot
