        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecordExternalReviewReceiptRequest' }
      responses:
        '200':
          description: 记录成功或幂等重放
          headers:
            X-Correlation-Id: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExternalReviewReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }

  /internal/client-review-cases:
    post:
      operationId: createClientReviewCase
      summary: 登记已回传车企并创建 CLIENT ReviewCase
      description: |
        仅 SERVICE 主体；需要 evidence.createClientReviewCase。
        sourceReviewCaseId 必须指向已 APPROVED/FORCE_APPROVED 的 INTERNAL ReviewCase。
        同事务冻结 Snapshot、外部提交引用、回执批次和映射版本；不代表 Connector 已实现。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateClientReviewCaseRequest' }
      responses:
        '201':
          description: 创建成功或幂等重放
          headers:
            Location: { schema: { type: string } }
            X-Correlation-Id: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewCase' }
        '400': { $ref: '#/components/responses/Problem' }
