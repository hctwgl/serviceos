        order: { type: integer, minimum: 0 }
        section: { type: string, minLength: 1, maxLength: 120 }
        requiredCapabilities: { type: array, items: { type: string, minLength: 1, maxLength: 120 } }
    MeNavigation:
      type: object
      additionalProperties: false
      required: [contextId, portal, contextVersion, navigationCatalogVersion, items, asOf]
      properties:
        contextId: { type: string, minLength: 1, maxLength: 200 }
        portal: { enum: [ADMIN, NETWORK, TECHNICIAN] }
        contextVersion: { type: string, minLength: 1, maxLength: 120 }
        navigationCatalogVersion: { type: string, minLength: 1, maxLength: 64 }
        items: { type: array, items: { $ref: '#/components/schemas/MeNavigationItem' } }
