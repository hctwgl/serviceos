        status: { type: [string, 'null'], maxLength: 32 }
        businessType: { type: [string, 'null'], maxLength: 100 }
        technicianId: { type: [string, 'null'], maxLength: 128 }
        effectiveFrom: { type: [string, 'null'], format: date-time }
    NetworkPortalTaskPage:
      type: object
      additionalProperties: false
      required: [networkId, items, asOf]
      properties:
        networkId: { type: string, format: uuid }
        items: { type: array, items: { $ref: '#/components/schemas/NetworkPortalTaskItem' } }
