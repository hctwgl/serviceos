      description: >-
        仅允许具备 integration.retryUnknownDelivery 的 USER principal 调用。必须携带原因、
        审批引用和预期聚合版本；复用同一不可变 payload 与外部幂等键，由新 Task 执行，
        不覆盖原 UNKNOWN attempt。
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RetryUnknownOutboundDeliveryRequest' }
      responses:
        '202':
          description: 人工重发请求及执行 Task 已原子登记
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeliveryReplayRequest' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 由受信 OIDC 提供方签发，必须包含 subject、tenant_id；token 中的能力声明不能替代 ServiceOS RoleGrant。
  parameters:
    PrincipalId:
      name: principalId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrgUnitId:
      name: orgUnitId
      in: path
      required: true
      schema: { type: string, format: uuid }
    MembershipId:
      name: membershipId
      in: path
      required: true
      schema: { type: string, format: uuid }
    DirectorySyncBatchId:
      name: batchId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PartnerOrganizationId:
      name: partnerOrganizationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ServiceNetworkId:
      name: networkId
      in: path
      required: true
      schema: { type: string, format: uuid }
    NetworkMembershipId:
      name: membershipId
      in: path
      required: true
      schema: { type: string, format: uuid }
    NetworkTechnicianMembershipId:
      name: membershipId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TechnicianProfileId:
      name: profileId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TechnicianQualificationId:
      name: qualificationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RoleId:
      name: roleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    GrantId:
      name: grantId
      in: path
      required: true
      schema: { type: string, format: uuid }
    DelegationId:
      name: delegationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OperationalExceptionId:
      name: exceptionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SlaInstanceId:
      name: slaInstanceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AppointmentId:
      name: appointmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VisitId:
      name: visitId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ContactAttemptId:
      name: contactAttemptId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    NetworkContext:
      name: X-Network-Context
      in: header
      required: true
      description: |
        M194：M188 contextId 形态 `NETWORK|NETWORK|{uuid}`，或经 ACTIVE NetworkMembership
        校验后的纯 network UUID。不得用查询参数代替。
      schema:
        type: string
        minLength: 36
        maxLength: 80
    TechnicianContext:
      name: X-Technician-Context
      in: header
      required: true
      description: |
        M195：M188 contextId 形态 `TECHNICIAN|NETWORK|{uuid}`，或经 ACTIVE
        NetworkTechnicianMembership 校验后的纯 network UUID。不得用查询参数代替。
      schema:
        type: string
        minLength: 36
        maxLength: 96
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 双引号包裹的正整数聚合版本，例如 `"3"`。
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
  schemas:
    SecurityPrincipal:
      type: object
      additionalProperties: false
      required: [id, type, status, displayName, employeeNumber, version, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        type: { enum: [USER, SERVICE] }
        status: { enum: [ACTIVE, DISABLED] }
        displayName: { type: string, minLength: 1, maxLength: 200 }
        employeeNumber: { type: [string, 'null'], minLength: 1, maxLength: 128 }
        version: { type: integer, format: int64, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SecurityPrincipalPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, asOf]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SecurityPrincipal' } }
        nextCursor: { type: [string, 'null'] }
        asOf: { type: string, format: date-time }
    PrincipalPersona:
      type: object
      additionalProperties: false
      required: [id, personaType, status, validFrom, validTo, version]
      properties:
        id: { type: string, format: uuid }
        personaType: { enum: [INTERNAL_EMPLOYEE, NETWORK_MEMBER, TECHNICIAN, CONSUMER, SERVICE_ACCOUNT] }
        status: { enum: [ACTIVE, DISABLED] }
        validFrom: { type: string, format: date-time }
        validTo: { type: [string, 'null'], format: date-time }
        version: { type: integer, format: int64, minimum: 1 }
    SecurityPrincipalDetail:
      type: object
      additionalProperties: false
      required: [principal, personas, asOf]
      properties:
        principal: { $ref: '#/components/schemas/SecurityPrincipal' }
        personas: { type: array, items: { $ref: '#/components/schemas/PrincipalPersona' } }
        asOf: { type: string, format: date-time }
    IdentityLink:
      type: object
      additionalProperties: false
      required: [id, issuer, subject, clientId, linkedAt]
      properties:
        id: { type: string, format: uuid }
        issuer: { type: string, minLength: 1, maxLength: 512 }
        subject: { type: string, minLength: 1, maxLength: 255 }
        clientId: { type: [string, 'null'], minLength: 1, maxLength: 128 }
        linkedAt: { type: string, format: date-time }
    LinkIdentityRequest:
      type: object
