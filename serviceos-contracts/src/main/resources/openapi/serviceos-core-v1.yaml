        profileId: { type: string, format: uuid }
        versionNo: { type: integer, minimum: 0 }
        revisionStatus: { enum: [DRAFT, PUBLISHED] }
        documentJson: { type: string }
        manifestJson: { type: string, nullable: true }
        validationJson: { type: string, nullable: true }
        contentDigest: { type: string, nullable: true, pattern: '^[0-9a-f]{64}$' }
        sourceBundleId: { type: string, format: uuid, nullable: true }
        workflowAssetVersionId: { type: string, format: uuid, nullable: true }
        effectiveFrom: { type: string, format: date-time, nullable: true }
        effectiveTo: { type: string, format: date-time, nullable: true }
        supersedesRevisionId: { type: string, format: uuid, nullable: true }
        publishedBy: { type: string, nullable: true }
        publishedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    ProjectFulfillmentManifest:
      type: object
      required: [manifestJson, contentDigest, runbook]
      properties:
        manifestJson:
          type: string
          minLength: 2
          description: 仅供开发诊断；普通产品页面不得作为主内容渲染
        contentDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        runbook: { $ref: '#/components/schemas/ProjectFulfillmentRunbook' }
    ProjectFulfillmentRunbook:
      type: object
      required:
        - profileName
        - serviceProductCode
        - serviceProductLabel
        - stageCount
        - stages
        - impactSummary
      properties:
        profileName: { type: string }
        serviceProductCode: { type: string }
        serviceProductLabel: { type: string }
        orderTypeName: { type: string, nullable: true }
        versionLabel: { type: string, nullable: true }
        stageCount: { type: integer, minimum: 0 }
        stages:
          type: array
          items: { $ref: '#/components/schemas/ProjectFulfillmentRunbookStage' }
        clientSupportSummary: { type: string, nullable: true }
        impactSummary: { type: string }
    ProjectFulfillmentRunbookStage:
      type: object
      required: [stageName, sequence, ownerTypeLabel, terminal]
      properties:
        stageName: { type: string }
        sequence: { type: integer }
        ownerTypeLabel: { type: string }
        taskTypeLabel: { type: string, nullable: true }
        formCount: { type: integer, minimum: 0 }
        formSummary: { type: string, nullable: true }
        evidenceCount: { type: integer, minimum: 0 }
        evidenceSummary: { type: string, nullable: true }
        actionCount: { type: integer, minimum: 0 }
        actionSummary: { type: string, nullable: true }
        nextStageSummary: { type: string, nullable: true }
        exceptionSummary: { type: string, nullable: true }
        slaSummary: { type: string, nullable: true }
        terminal: { type: boolean }
    ProjectFulfillmentCompareImpact:
      type: object
      required:
        - profileId
        - draftRevisionId
        - baselineKind
        - changeCount
        - changes
        - impact
        - risks
        - asOf
      properties:
        profileId: { type: string, format: uuid }
        draftRevisionId: { type: string, format: uuid }
        baselineKind: { enum: [NONE, PUBLISHED] }
        baselineRevisionId: { type: string, format: uuid, nullable: true }
        baselineVersionLabel: { type: string, nullable: true }
        changeCount: { type: integer, minimum: 0 }
        changes:
          type: array
          items: { $ref: '#/components/schemas/ProjectFulfillmentCompareChange' }
        impact: { $ref: '#/components/schemas/ProjectFulfillmentImpactSummary' }
        risks:
          type: array
          items: { type: string }
        asOf: { type: string, format: date-time }
    ProjectFulfillmentCompareChange:
      type: object
      required: [category, changeType, summary]
      properties:
        category:
          enum: [STAGE, TASK, FORM, EVIDENCE, ACTION, SLA, DISPATCH, NOTIFICATION, OTHER]
        changeType: { enum: [ADDED, REMOVED, MODIFIED] }
        summary: { type: string }
        detail: { type: string, nullable: true }
    ProjectFulfillmentImpactSummary:
      type: object
      required: [newWorkOrdersScope, existingWorkOrdersScope]
      properties:
        newWorkOrdersScope: { type: string }
        existingWorkOrdersScope: { type: string }
        effectiveFromHint: { type: string, nullable: true }
    ProjectFulfillmentValidationIssue:
      type: object
      required: [severity, errorCode, userMessage]
      properties:
        severity: { enum: [ERROR, WARNING, INFO] }
        errorCode: { type: string }
        profileId: { type: string, nullable: true }
        stageCode: { type: string, nullable: true }
        assetType: { type: string, nullable: true }
        assetRef: { type: string, nullable: true }
        fieldPath: { type: string, nullable: true }
        userMessage: { type: string }
        technicalMessage: { type: string, nullable: true }
        suggestion: { type: string, nullable: true }
    CreateProjectFulfillmentProfileRequest:
      type: object
      required: [serviceProductCode, profileName]
      properties:
        serviceProductCode: { type: string, minLength: 1, maxLength: 96 }
        profileName: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 2000 }
        templateCode: { type: string, enum: [HOME_CHARGING_SURVEY_INSTALL, BLANK] }
        copyFromProfileId: { type: string, format: uuid }
    UpdateProjectFulfillmentDraftRequest:
      type: object
      required: [document]
      properties:
        profileName: { type: string, maxLength: 200 }
        description: { type: string, maxLength: 2000 }
        document: { $ref: '#/components/schemas/ProjectFulfillmentDocument' }
        workflowAssetVersionId: { type: string, format: uuid }
        sourceBundleId: { type: string, format: uuid }
    PublishProjectFulfillmentRevisionRequest:
      type: object
      properties:
        effectiveFrom: { type: string, format: date-time }
        publishNote: { type: string, maxLength: 500 }
    WorkOrderFulfillmentSnapshot:
      type: object
      required: [workOrderId, projectId, serviceProductCode, configKind]
      properties:
        workOrderId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        serviceProductCode: { type: string }
        configKind: { enum: [PROFILE_REVISION, LEGACY_BUNDLE] }
        profileId: { type: string, format: uuid, nullable: true }
        profileName: { type: string, nullable: true }
        revisionId: { type: string, format: uuid, nullable: true }
        fulfillmentVersion: { type: string, nullable: true }
        configurationBundleId: { type: string, format: uuid, nullable: true }
        configurationBundleVersion: { type: string, nullable: true }
        configurationBundleDigest: { type: string, nullable: true }
        manifestJson: { type: string, nullable: true }
        contentDigest: { type: string, nullable: true }
        frozenAt: { type: string, format: date-time, nullable: true }
        legacyExplanation: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, errorCode]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        errorCode: { type: string }
        correlationId: { type: [string, 'null'] }
  responses:
    SecurityPrincipalCommandResult:
      description: 主体命令成功或首次幂等结果重放成功
      headers:
        ETag: { required: true, schema: { type: string } }
        X-Correlation-Id: { required: true, schema: { type: string } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SecurityPrincipal' }
    VisitCommandReceipt:
      description: Visit 命令成功或返回首次幂等冻结响应
      headers:
        ETag: { required: true, schema: { type: string } }
        X-Correlation-Id: { required: true, schema: { type: string } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/VisitCommandReceipt' }
    AppointmentCommandReceipt:
      description: 命令成功或返回首次幂等冻结响应
      headers:
        ETag:
          required: true
          schema: { type: string }
        X-Correlation-Id:
          required: true
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AppointmentCommandReceipt' }
    OperationalExceptionAcknowledgement:
      description: 确认成功或幂等重放成功
      headers:
        ETag:
          required: true
          schema: { type: string }
        X-Correlation-Id:
          required: true
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/OperationalExceptionAcknowledgement' }
    HumanTaskCommandReceipt:
      description: 命令成功或幂等重放成功
      headers:
        ETag:
          required: true
          schema: { type: string }
        X-Correlation-Id:
          required: true
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/HumanTaskCommandReceipt' }
    ReleasedHumanTaskReceipt:
      description: 释放成功或幂等重放成功
      headers:
        ETag:
          required: true
          schema: { type: string }
        X-Correlation-Id:
          required: true
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ReleasedHumanTaskReceipt' }

    Problem:
      description: RFC 9457 Problem Details
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
