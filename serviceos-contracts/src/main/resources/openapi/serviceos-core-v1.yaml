    get:
      operationId: listAuthorizedReviewCases
      summary: 查询当前主体有权审核的案例队列
      description: >-
        API-06 §6 窄切片；默认 OPEN，按 createdAt/reviewCaseId 正序稳定分页。
        需要 evidence.review，游标绑定实时项目范围和全部筛选。
      parameters:
        - { name: projectId, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { enum: [OPEN, APPROVED, REJECTED, FORCE_APPROVED, REOPENED], default: OPEN } }
        - { name: origin, in: query, schema: { enum: [INTERNAL, CLIENT] } }
        - { name: taskId, in: query, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
