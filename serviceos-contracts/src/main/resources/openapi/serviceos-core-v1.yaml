  /network-portal/capacity:
    get:
      operationId: listNetworkPortalCapacity
      summary: Network Portal 本网点容量计数
      description: |
        M194：X-Network-Context + networkTask.read。读取 dsp_capacity_counter（NETWORK assignee）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 本网点容量计数列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
