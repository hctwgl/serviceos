        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /work-orders:
    get:
      operationId: listAuthorizedWorkOrders
      summary: 查询当前主体有权读取的工单目录
      description: |
        workOrder.read 实时项目范围在 SQL 中收敛；cursor 绑定范围摘要和全部筛选条件。
        M429：items 含服务端脱敏客户联系 `maskedCustomerName` / `maskedCustomerPhone` /
        `maskedServiceAddress`（随基座返回，不 soft-omit；无原文）。
        M434：可选页级 `slaRiskSummaries`；需 PROJECT `sla.read` soft-gate，缺能力时省略属性；
        有能力且本页无开放风险时返回 []；仅含 openCount>0 行。
        M436：页级 `totalCount` / `totalCountTruncated`（当前筛选、无 cursor）；
        上限 100，超出只声明 truncated，不返回精确全量 COUNT(*)。
        M437：可选 `provinceCode` / `cityCode` / `districtCode` 国标码精确匹配（AND）；
        写入 cursor filterDigest；不发明名称解析。
        M438：可选 `currentStageCode` 与目录列同口径（最早 ACTIVE 任务 stageCode）精确匹配；
        经 task SPI 解析后以工单 ID IN 收敛；写入 cursor filterDigest。
      parameters:
        - { name: clientCode, in: query, schema: { type: string, minLength: 1, maxLength: 128 } }
        - { name: projectId, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { enum: [RECEIVED, ACTIVE, FULFILLED] } }
        - { name: provinceCode, in: query, schema: { type: string, minLength: 1, maxLength: 16 },
            description: M437：省国标码精确匹配 }
        - { name: cityCode, in: query, schema: { type: string, minLength: 1, maxLength: 16 },
            description: M437：市国标码精确匹配 }
        - { name: districtCode, in: query, schema: { type: string, minLength: 1, maxLength: 16 },
            description: M437：区县国标码精确匹配 }
        - { name: currentStageCode, in: query,
            schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[A-Z][A-Z0-9_]*$' },
            description: M438：当前阶段码精确匹配（与 currentStageCode 列同口径） }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: receivedAt/id 倒序的授权工单页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkOrderPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}:
    get:
      operationId: getAuthorizedWorkOrder
      summary: 读取工单当前权威事实（含服务端脱敏客户联系，无原文 PII）
