        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvalidateEvidenceRevisionRequest' }
      responses:
        '200':
          description: 作废成功或幂等重放
          headers:
            X-Correlation-Id:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceRevision' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }

