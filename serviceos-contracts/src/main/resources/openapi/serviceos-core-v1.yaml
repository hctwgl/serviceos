        复用 ManualAssignNetwork 编排；能力为 dispatch.assignment.manage 与
        dispatch.capacity.configure。已有相同网点 ACTIVE NETWORK 时幂等回放；
        其他网点 ACTIVE 返回 SERVICE_ASSIGNMENT_CONFLICT（409）。
        派网点后网点端列表可见，可再确认接单或指派师傅。
