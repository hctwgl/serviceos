        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvalidateStoredFileRequest' }
      responses:
        '200':
          description: 作废成功或幂等重放
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StoredFile' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '423': { $ref: '#/components/responses/Problem' }

  /sla-instances:
    get:
      operationId: listSlaInstances
      summary: 查询实时授权项目范围内的 SLA 工作台
      description: >-
        projectId 存在时按 sla.read + Project Scope 实时鉴权；省略时一次性解析当前有效
        TENANT/PROJECT RoleGrant 并以单条范围化 SQL 查询。仅有 REGION/NETWORK 授权且尚无权威
        项目映射时失败关闭。授权集合变化会令旧游标失效。动态秒数只使用响应 asOf，客户端不得
        自行改变 SLA 状态。按 deadlineAt、slaInstanceId 正序稳定翻页。
      parameters:
        - name: projectId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [RUNNING, BREACHED, MET, MET_LATE] }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 授权项目的 SLA 稳定游标页
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlaInstancePage' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}/sla-instances:
    get:
      operationId: listWorkOrderSlaInstances
      summary: 查询工单冻结的全部 SLA 时钟
      description: 先从 WorkOrder 权威事实解析 project，再实时复核 sla.read Project Scope。
      parameters:
        - $ref: '#/components/parameters/WorkOrderId'
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 工单 SLA 时间线
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlaInstancePage' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /sla-instances/{slaInstanceId}:
    get:
      operationId: getSlaInstance
      summary: 查询 SLA 实例、时钟片段和里程碑详情
      parameters:
        - $ref: '#/components/parameters/SlaInstanceId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: SLA 权威详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlaInstanceDetail' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /operational-exceptions:
    get:
      operationId: listOperationalExceptions
      summary: 查询当前租户的运营异常工作台
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [OPEN, ACKNOWLEDGED, RESOLVED] } }
        - { name: category, in: query, schema: { type: string } }
        - { name: severity, in: query, schema: { type: string, enum: [P0, P1, P2, P3] } }
        - { name: workOrderId, in: query, schema: { type: string, format: uuid } }
        - { name: taskId, in: query, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 按 openedAt、exceptionId 倒序返回的稳定游标页
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationalExceptionPage' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /operational-exceptions/{exceptionId}:
    get:
      operationId: getOperationalException
