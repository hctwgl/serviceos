      description: |
        M205：X-Network-Context + NETWORK scope technician.readOwnNetwork。
        仅返回对本网点持有 ACTIVE NetworkTechnicianMembership 的师傅资质安全摘要；
        可选 status / technicianProfileId 过滤；按 submittedAt/id 正序，内存 limit（1～100，默认 50）。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
        - name: status
          in: query
          schema: { enum: [PENDING, APPROVED, REJECTED, EXPIRED] }
        - name: technicianProfileId
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: 本网点资质列表页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalQualificationPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
