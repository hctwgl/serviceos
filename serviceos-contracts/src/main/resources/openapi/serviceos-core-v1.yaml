        window: { $ref: '#/components/schemas/AppointmentWindow' }
        addressRef: { type: string }
        addressVersion: { type: string }
        confirmedPartyType: { type: [string, 'null'] }
        confirmedPartyRef: { type: [string, 'null'] }
        confirmationChannel: { type: [string, 'null'] }
        confirmedAt: { type: [string, 'null'], format: date-time }
        reasonCode: { type: [string, 'null'] }
        note: { type: [string, 'null'] }
        noShowPartyType: { type: [string, 'null'] }
        noShowPartyRef: { type: [string, 'null'] }
        noShowEvidenceRefs:
