openapi: 3.1.0
info:
  title: ServiceOS Core API
  version: 0.30.0
  description: 首条工程纵向切片的机器可读契约；实现与客户端均不得绕过本契约自行猜测字段。
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /projects:
    post:
      operationId: createProject
      summary: 创建运营项目
      description: 同一租户、操作和 Idempotency-Key 下，相同请求返回同一资源；不同请求返回冲突。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 项目创建成功或幂等重放成功
          headers:
            Location:
              schema: { type: string }
            X-Correlation-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /tasks/{taskId}:claim:
    post:
      operationId: claimHumanTask
      summary: 领取 READY 人工任务
      description: 主体来自 JWT；相同幂等键和请求返回首次冻结响应，陈旧版本或并发领取返回 409。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200': { $ref: '#/components/responses/HumanTaskCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:assign-candidates:
    post:
      operationId: assignTaskCandidates
      summary: 为 READY 人工任务冻结 USER 候选快照
      description: 替换旧候选快照并递增 Task 版本；角色/组织策略必须先解析为稳定 USER ID。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignTaskCandidatesRequest' }
      responses:
        '200':
          description: 候选快照已冻结或返回首次幂等响应
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaskAssignmentBatchReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:start:
    post:
      operationId: startHumanTask
      summary: 当前领取人启动人工任务
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200': { $ref: '#/components/responses/HumanTaskCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:complete:
    post:
      operationId: completeHumanTask
      summary: 当前执行人完成人工工作流任务
      description: >-
        formRef 非空且无非空 EvidenceSlot 的表单 Task：resultRef=form-submission://{submissionId}。
        无 formRef 且有非空 EvidenceSlot 的资料 Task：resultRef=evidence-set-snapshot://{snapshotId}。
        同时具备 formRef 与非空 EvidenceSlot 时：resultRef 仍为 FormSubmission；必须提供
        inputVersionRefs，恰好包含 FORM_SUBMISSION（与 resultRef/digest 一致）与
        EVIDENCE_SET_SNAPSHOT（同 Task/Project、purpose=TASK_SUBMISSION）。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteHumanTaskRequest' }
      responses:
        '200': { $ref: '#/components/responses/HumanTaskCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:release:
    post:
      operationId: releaseHumanTask
      summary: 当前责任人在 start 前释放已领取任务
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReleaseHumanTaskRequest' }
      responses:
        '200': { $ref: '#/components/responses/ReleasedHumanTaskReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /files/upload-sessions:
    post:
      operationId: beginFileUpload
      summary: 创建受限文件上传会话
      description: >-
        服务端生成私有 object key，返回绑定精确大小、声明 MIME 和有效期的短期上传授权；
        相同 Idempotency-Key 与请求会返回同一 uploadSessionId。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeginUploadRequest'
      responses:
        '201':
          description: 上传会话创建或幂等重放成功
          headers:
            Location:
              schema: { type: string }
            X-Correlation-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSession'
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /files/upload-sessions/{uploadSessionId}:finalize:
    post:
      operationId: finalizeFileUpload
      summary: 校验对象并创建不可变文件
      description: >-
        事务外重新读取对象的真实大小、SHA-256 与魔数 MIME；通过后创建 QUARANTINED/PENDING_SCAN
        文件并在同一事务调度扫描任务。对象存储回调不能调用此能力。
      parameters:
        - name: uploadSessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeUploadRequest'
      responses:
        '201':
          description: 文件已创建或 finalize 幂等重放成功；扫描通过前仍不可下载
          headers:
            Location:
              schema: { type: string }
            X-Correlation-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredFile'
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '410': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /files/{fileId}/download-authorizations:
    post:
      operationId: authorizeFileDownload
      summary: 申请文件短期下载授权
      description: 每次实时校验 RoleGrant；仅 AVAILABLE 文件可获得短期私有下载 URL，目的写入审计。
      parameters:
        - name: fileId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeDownloadRequest'
      responses:
        '201':
          description: 短期下载授权已签发
          headers:
            Location:
              schema: { type: string }
            X-Correlation-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadAuthorization'
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '423': { $ref: '#/components/responses/Problem' }
  /files/{fileId}:invalidate:
    post:
      operationId: invalidateStoredFile
      summary: 作废 AVAILABLE StoredFile
      parameters:
        - name: fileId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvalidateStoredFileRequest' }
      responses:
        '200':
          description: 作废成功或幂等重放
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StoredFile' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '423': { $ref: '#/components/responses/Problem' }

  /operational-exceptions:
    get:
      operationId: listOperationalExceptions
      summary: 查询当前租户的运营异常工作台
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [OPEN, ACKNOWLEDGED, RESOLVED] } }
        - { name: category, in: query, schema: { type: string } }
        - { name: severity, in: query, schema: { type: string, enum: [P0, P1, P2, P3] } }
        - { name: workOrderId, in: query, schema: { type: string, format: uuid } }
        - { name: taskId, in: query, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 按 openedAt、exceptionId 倒序返回的稳定游标页
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationalExceptionPage' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /operational-exceptions/{exceptionId}:
    get:
      operationId: getOperationalException
      summary: 查询当前租户的运营异常详情
      parameters:
        - $ref: '#/components/parameters/OperationalExceptionId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 异常详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationalException' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /operational-exceptions/{exceptionId}:acknowledge:
    post:
      operationId: acknowledgeOperationalException
      summary: 确认 OPEN 运营异常
      description: 仅记录人工已接管事实；不伪造领域解决动作。相同幂等键返回首次冻结响应。
      parameters:
        - $ref: '#/components/parameters/OperationalExceptionId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcknowledgeOperationalExceptionRequest' }
      responses:
        '200': { $ref: '#/components/responses/OperationalExceptionAcknowledgement' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/appointments:
    get:
      operationId: listTaskAppointments
      summary: 查询任务的预约修订链
      description: 实时按 Task 的 project/network scope 授权；allowedActions 只返回当前主体可执行动作。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 当前租户下该任务的预约列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    post:
      operationId: proposeAppointment
      summary: 为人工履约任务提议预约
      description: project/work order/network/technician 快照均由服务端实时责任链解析，不接受客户端代填。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProposeAppointmentRequest' }
      responses:
        '201': { $ref: '#/components/responses/AppointmentCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/forms:
    get:
      operationId: listTaskForms
      summary: 查询任务锁定的表单版本
      description: 按 form.read 与 Task 项目范围实时授权，只解析 Task 冻结 Bundle 内的精确 FormVersion。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 当前任务锁定的表单；无 formRef 时返回空数组
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TaskForm' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/evidence-slots:
    get:
      operationId: listTaskEvidenceSlots
      summary: 查询任务从冻结配置解析的资料槽位
      description: >-
        按 evidence.read 与 Task 项目范围实时授权。可靠解析尚未完成时返回 409，
        不把暂时空结果解释为无需资料。返回最新 generation 的活动槽位以及尚待人工处置的
        REVIEW_REQUIRED 历史槽位；完整表单值不会进入响应。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 权威固定槽位；无匹配阶段模板时返回已解析的空数组
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/EvidenceSlot' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/evidence-slots/{slotId}:resolve-condition-change:
    post:
      operationId: resolveEvidenceConditionChange
      summary: 处置条件变化后的已提交资料
      description: >-
        要求 HIGH 风险 evidence.condition-disposition capability。expectedResolutionId 必须精确指向
        产生 REVIEW_REQUIRED 的解析代次；后续表单代次不会清除该未决事实。KEEP 保留历史，INVALIDATE
        复用 EvidenceRevision 与 StoredFile 作废链路。任何未完成校验或并发代次变化均返回 409。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EvidenceConditionDispositionRequest' }
      responses:
        '200':
          description: 处置成功或幂等重放成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceConditionDisposition' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/evidence-slots/{slotId}/upload-sessions:
    post:
      operationId: beginEvidenceUpload
      summary: 为资料槽位创建受限上传会话
      description: >-
        evidence 编排 files BeginUpload；要求 evidence.submit、file.upload、当前责任人与未 Guard 的
        RUNNING HUMAN Task。CaptureMetadata 由服务端规范化；onBehalfOf 在 M38 失败关闭。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BeginEvidenceUploadRequest' }
      responses:
        '201':
          description: 上传会话创建或幂等重放成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceUploadSession' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/evidence-slots/{slotId}/upload-sessions/{uploadSessionId}:finalize:
    post:
      operationId: finalizeEvidenceUpload
      summary: Finalize 资料上传并创建 EvidenceItem/Revision
      description: >-
        先通过 files Finalize 创建隔离文件，再在资料事务中写入不可变 EvidenceRevision。
        相同 finalizeCommandId 重试不重复创建 Revision。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: uploadSessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FinalizeEvidenceUploadRequest' }
      responses:
        '201':
          description: EvidenceItem 与首个或后续 Revision 已创建或幂等重放
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceItem' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '410': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/evidence-items:
    get:
      operationId: listTaskEvidenceItems
      summary: 查询任务资料项与版本投影
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 任务下全部 EvidenceItem
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/EvidenceItem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /evidence-items/{itemId}:
    get:
      operationId: getEvidenceItem
      summary: 查询逻辑资料项及全部不可变版本
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: EvidenceItem 与 Revisions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceItem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /evidence-revisions/{revisionId}:invalidate:
    post:
      operationId: invalidateEvidenceRevision
      summary: 作废已通过机器校验的资料版本
