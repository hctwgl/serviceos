openapi: 3.1.0
info:
  title: ServiceOS Core API
  version: 0.57.0
  description: 首条工程纵向切片的机器可读契约；实现与客户端均不得绕过本契约自行猜测字段。
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /work-orders:
    get:
      operationId: listAuthorizedWorkOrders
      summary: 查询当前主体有权读取的工单目录
      description: workOrder.read 实时项目范围在 SQL 中收敛；cursor 绑定范围摘要和全部筛选条件。
      parameters:
        - { name: clientCode, in: query, schema: { type: string, minLength: 1, maxLength: 128 } }
        - { name: projectId, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { enum: [RECEIVED, ACTIVE, FULFILLED] } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: receivedAt/id 倒序的授权工单页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkOrderPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}:
    get:
      operationId: getAuthorizedWorkOrder
      summary: 读取不含客户 PII 的工单当前权威事实
      parameters:
        - { name: workOrderId, in: path, required: true, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 工单当前事实
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkOrderDetail' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}/stages:
    get:
      operationId: getAuthorizedWorkOrderStages
      summary: 读取工单 Workflow 与 Stage 当前权威投影
      description: 复用工单 tenant 隔离与 workOrder.read 实时项目鉴权；尚未初始化时显式返回空投影。
      parameters:
        - { name: workOrderId, in: path, required: true, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Workflow 和 sequenceNo 正序 Stage 投影
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkflowExecutionProjection' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}/tasks:
    get:
      operationId: listAuthorizedWorkOrderTasks
      summary: 分页读取工单 Task 执行摘要
      description: createdAt/taskId 正序稳定分页；cursor 绑定 workOrderId，不返回载荷或结果引用。
      parameters:
        - { name: workOrderId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 工单 Task 执行摘要页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkOrderTaskPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}/timeline:
    get:
      operationId: listWorkOrderCoreTimeline
      summary: 查询工单执行与现场履约时间线
      description: >-
        每页复用 workOrder.read 实时 Project Scope 鉴权；返回由公开领域事件构建的
        工单执行、现场履约、SLA、资料/审核/整改、外发交付与异常闭环时间线。
        试算/结算尚未合并。
      parameters:
        - { name: workOrderId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: occurredAt/timelineEntryId 倒序的工单执行与现场履约时间线页
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkOrderTimelinePage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}/workspace:
    get:
      operationId: getWorkOrderWorkspace
      summary: 查询工单工作区顶层组合快照
      description: >-
        复用 workOrder.read 实时鉴权，组合 Task/时间线 freshness 与可选 SLA/异常摘要。
        不含客户 PII；大区块按需加载见 workspace/sections（M87：TASKS/TIMELINE_AUDIT）。
      parameters:
        - { name: workOrderId, in: path, required: true, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 工单工作区顶层快照
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkOrderWorkspace' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}/workspace/sections/{section}:
    get:
      operationId: getWorkOrderWorkspaceSection
      summary: 按需加载工单工作区区块
      description: >-
        M87 仅接受 TASKS 与 TIMELINE_AUDIT；其余 section 失败关闭为 400。
        复用 workOrder.read；实时组合，不落区块投影表；不含客户 PII。
      parameters:
        - { name: workOrderId, in: path, required: true, schema: { type: string, format: uuid } }
        - name: section
          in: path
          required: true
          schema: { enum: [TASKS, TIMELINE_AUDIT] }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 工作区区块快照
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkOrderWorkspaceSection' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /projects:
    get:
      operationId: listAuthorizedProjects
      summary: 查询当前主体有权读取的项目目录
      description: >-
        project.read 的实时 TENANT/PROJECT/REGION/NETWORK RoleGrant 范围在 SQL 中收敛；
        cursor 绑定范围摘要与全部筛选条件，授权或筛选变化后失败关闭。
      parameters:
        - name: clientId
          in: query
          schema: { type: string, minLength: 1, maxLength: 128 }
        - name: status
          in: query
          schema: { enum: [DRAFT, ACTIVE, SUSPENDED, CLOSED] }
        - name: activeOn
          in: query
          schema: { type: string, format: date }
        - name: cursor
          in: query
          schema: { type: string, minLength: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: projectCode/projectId 正序的授权项目页
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectPage' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createProject
      summary: 创建运营项目
      description: 同一租户、操作和 Idempotency-Key 下，相同请求返回同一资源；不同请求返回冲突。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 项目创建成功或幂等重放成功
          headers:
            Location:
              schema: { type: string }
            X-Correlation-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}:
    get:
      operationId: getAuthorizedProject
      summary: 读取项目当前事实与当前范围关系
      description: 先按 JWT tenant 隔离读取，再按实时 project.read 范围授权；跨租户统一返回 404。
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 项目当前事实
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectDetail' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /projects/{projectId}/scope-revisions:
    get:
      operationId: listAuthorizedProjectScopeRevisions
      summary: 查询项目范围关系不可变修订历史
      description: aggregateVersion 倒序分页；cursor 绑定 projectId，不能跨项目重放。
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          schema: { type: string, minLength: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 项目范围关系修订历史页
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectScopeRelationRevisionPage' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /projects/{projectId}:revise-scope-relations:
    post:
      operationId: reviseProjectScopeRelations
      summary: 整组修订项目 REGION/NETWORK 关系
      description: >-
        两类集合均显式必填；空数组表示终止该类型全部当前关系。修订只追加有效期历史，
        陈旧版本、无变化请求或幂等键载荷变化失败关闭。
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviseProjectScopeRelationsRequest'
      responses:
        '200':
          description: 修订成功或返回首次幂等结果
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectScopeRelationRevision'
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks:
    get:
      operationId: listAuthorizedTasks
      summary: 查询当前主体有权读取的任务队列
      description: task.read 实时项目范围在 SQL 中收敛；assignee 仅接受 me；cursor 绑定范围和筛选。
      parameters:
        - { name: projectId, in: query, schema: { type: string, format: uuid } }
        - { name: taskKind, in: query, schema: { enum: [HUMAN, AUTOMATED] } }
        - { name: status, in: query, schema: { enum: [READY, PENDING, CLAIMED, RUNNING, RETRY_WAIT, SUCCEEDED, COMPLETED, MANUAL_INTERVENTION, CANCELLED] } }
        - { name: assignee, in: query, schema: { enum: [me] } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: priority DESC/nextRunAt/createdAt/taskId 稳定任务页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/TaskDirectoryPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:
    get:
      operationId: getAuthorizedTask
      summary: 读取任务当前事实、责任和冻结引用
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 任务详情
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/TaskDetail' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/allowed-actions:
    get:
      operationId: getTaskAllowedActions
      summary: 查询当前主体可渲染的 Task 动作
      description: >-
        先执行 task.read tenant/scope 鉴权，再按与写命令相同的 capability、Task 状态、
        ACTIVE CANDIDATE/RESPONSIBLE 和 execution guard 实时投影。响应不是授权凭证，
        后续命令仍必须携带 If-Match 和 Idempotency-Key 并重新校验全部前置条件。
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Task 当前版本上的稳定动作集合
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/TaskAllowedActions' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/execution-attempts:
    get:
      operationId: listTaskExecutionAttempts
      summary: 查询自动 Task 的执行 Attempt 历史
      description: >-
        每页先按 task.read 实时鉴权，再按 attemptNo DESC 查询 Task 模块已有执行历史。
        HUMAN Task 返回空页；响应不包含 workerId、payload、错误正文、私有响应或凭据。
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: attemptNo DESC 稳定执行历史页
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/TaskExecutionAttemptPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:claim:
    post:
      operationId: claimHumanTask
      summary: 领取 READY 人工任务
      description: 主体来自 JWT；相同幂等键和请求返回首次冻结响应，陈旧版本或并发领取返回 409。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200': { $ref: '#/components/responses/HumanTaskCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:assign-candidates:
    post:
      operationId: assignTaskCandidates
      summary: 为 READY 人工任务冻结 USER 候选快照
      description: 替换旧候选快照并递增 Task 版本；角色/组织策略必须先解析为稳定 USER ID。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignTaskCandidatesRequest' }
      responses:
        '200':
          description: 候选快照已冻结或返回首次幂等响应
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaskAssignmentBatchReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:start:
    post:
      operationId: startHumanTask
      summary: 当前领取人启动人工任务
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200': { $ref: '#/components/responses/HumanTaskCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:complete:
    post:
      operationId: completeHumanTask
      summary: 当前执行人完成人工工作流任务
      description: >-
        formRef 非空且无非空 EvidenceSlot 的表单 Task：resultRef=form-submission://{submissionId}。
        无 formRef 且有非空 EvidenceSlot 的资料 Task：resultRef=evidence-set-snapshot://{snapshotId}。
        同时具备 formRef 与非空 EvidenceSlot 时：resultRef 仍为 FormSubmission；必须提供
        inputVersionRefs，恰好包含 FORM_SUBMISSION（与 resultRef/digest 一致）与
        EVIDENCE_SET_SNAPSHOT（同 Task/Project、purpose=TASK_SUBMISSION）。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteHumanTaskRequest' }
      responses:
        '200': { $ref: '#/components/responses/HumanTaskCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}:release:
    post:
      operationId: releaseHumanTask
      summary: 当前责任人在 start 前释放已领取任务
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
