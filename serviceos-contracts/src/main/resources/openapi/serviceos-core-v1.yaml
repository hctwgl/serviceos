  /review-cases:
    get:
      operationId: listAuthorizedReviewCases
      summary: 查询当前主体有权审核的案例队列
      description: >-
        API-06 §6 窄切片；默认 OPEN，按 createdAt/reviewCaseId 正序稳定分页。
        需要 evidence.review，游标绑定实时项目范围和全部筛选。
      parameters:
        - { name: projectId, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { enum: [OPEN, APPROVED, REJECTED, FORCE_APPROVED, REOPENED], default: OPEN } }
        - { name: origin, in: query, schema: { enum: [INTERNAL, CLIENT] } }
        - { name: taskId, in: query, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 审核案例队列页
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewCaseQueuePage' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createReviewCase
      summary: 为 TASK_SUBMISSION EvidenceSetSnapshot 创建审核案例
      description: |
        同一 Snapshot 至多一个非 REOPENED 活跃案例，且至多一个 OPEN。初始状态 OPEN。
        需要 evidence.review 能力与项目 Scope。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReviewCaseRequest' }
      responses:
        '201':
          description: 创建成功或幂等重放
          headers:
            Location: { schema: { type: string } }
            X-Correlation-Id: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewCase' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /review-cases/{reviewCaseId}:
    get:
      operationId: getReviewCase
      summary: 查询审核案例与决定历史
      parameters:
        - name: reviewCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: ReviewCase
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewCase' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /review-cases/{reviewCaseId}:decide:
    post:
      operationId: decideReviewCase
      summary: 对 OPEN ReviewCase 追加 APPROVED/REJECTED 决定
      description: |
        决定只追加；Case 状态投影写为 APPROVED 或 REJECTED。
        REJECTED 至少需要一个 reasonCode。已裁决案例不可再裁决。
      parameters:
        - name: reviewCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: If-Match
          in: header
          required: true
          description: M353：绑定 ReviewCase.aggregateVersion 的强 ETag（引号整数）
          schema: { type: string, pattern: '^"[1-9][0-9]*"$' }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DecideReviewCaseRequest' }
      responses:
        '200':
          description: 裁决成功或幂等重放
          headers:
            X-Correlation-Id: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewCase' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /review-cases/{reviewCaseId}:force-approve:
    post:
      operationId: forceApproveReviewCase
      summary: 对 OPEN ReviewCase 强制通过
      description: |
        追加 FORCE_APPROVED 决定，不伪装为 APPROVED，不打开 CorrectionCase。
        需要 evidence.forceApprove；必须提供 reasonCodes 与 approvalRef。
      parameters:
        - name: reviewCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForceApproveReviewCaseRequest' }
      responses:
        '200':
          description: 强制通过成功或幂等重放
          headers:
            X-Correlation-Id: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewCase' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /review-cases/{reviewCaseId}:reopen:
    post:
      operationId: reopenReviewCase
      summary: 重开已通过审核案例并创建新 OPEN 案例
      description: |
        仅 APPROVED/FORCE_APPROVED 可重开。旧案例标记 REOPENED，同 Snapshot 新建 OPEN 案例。
        需要 review.reopen；必须提供 reason 与 triggerRef。
      parameters:
        - name: reviewCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReopenReviewCaseRequest' }
      responses:
        '201':
          description: 新 OPEN ReviewCase 创建成功或幂等重放
          headers:
            Location: { schema: { type: string } }
            X-Correlation-Id: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewCase' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }

  /internal/external-review-receipts:
    post:
      operationId: recordExternalReviewReceipt
      summary: 适配层记录车企外部审核回执
      description: |
        仅 SERVICE 主体；需要 evidence.recordExternalReceipt。
        只接受 OPEN CLIENT ReviewCase，且批次和映射版本必须命中该案例冻结值。
        追加 EXTERNAL ReviewDecision；REJECTED 创建客服协调 Task。
