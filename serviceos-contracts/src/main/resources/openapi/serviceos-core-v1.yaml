openapi: 3.1.0
info:
  title: ServiceOS Core API
  version: 1.0.100
  description: 首条工程纵向切片的机器可读契约；实现与客户端均不得绕过本契约自行猜测字段。
x-serviceos-client-metadata:
  requiredForNewClients: true
  authorizationInput: false
  headers:
    kind:
      name: X-ServiceOS-Client-Kind
      enum: [ADMIN_WEB, NETWORK_WEB, TECHNICIAN_WEB, TECHNICIAN_IOS]
    version:
      name: X-ServiceOS-Client-Version
      pattern: '^[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]{1,32})?$'
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /security-principals:
    get:
      operationId: listSecurityPrincipals
      summary: 分页查询当前租户的统一主体目录
      description: 需要 identity.read；普通目录不返回 issuer、subject 等敏感身份绑定。
      parameters:
        - { name: query, in: query, schema: { type: string, minLength: 1, maxLength: 200 } }
        - { name: status, in: query, schema: { enum: [ACTIVE, DISABLED] } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: displayName/principalId 正序的主体页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SecurityPrincipalPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: registerSecurityPrincipal
      summary: 登记统一主体（不保存密码）
      description: |
        M402：需要 identity.register。创建 USER 主体与可选 Persona；不接受密码字段。
        登录仍依赖后续 OIDC IdentityLink（identity.manageLinks）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterSecurityPrincipalRequest' }
      responses:
        '201':
          description: 已登记主体
          headers:
            ETag: { required: true, schema: { type: string } }
            Location: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SecurityPrincipal' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /admin/user-directory:
    get:
      operationId: listAdminUserDirectory
      summary: Admin 用户目录（含组织/角色摘要）
      description: |
        M402：基于 identity.read 列出主体；organizationSummary / roleSummary 分别依赖
        organization.read / authorization.read，缺权时对应字段为 null（soft-gate）。
      parameters:
        - { name: query, in: query, schema: { type: string, minLength: 1, maxLength: 200 } }
        - { name: status, in: query, schema: { enum: [ACTIVE, DISABLED] } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 用户目录页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/AdminUserDirectoryPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}:
    get:
      operationId: getSecurityPrincipal
      summary: 读取统一主体及 Persona
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 主体当前事实，不含敏感身份绑定
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SecurityPrincipalDetail' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/recent-logins:
    get:
      operationId: listPrincipalRecentLogins
      summary: 查询主体最近成功登录
      description: |
        M403：需要 identity.read。仅返回成功 OIDC 解析事实；不含 subject/密码。
        issuer 仅作登录渠道展示，不能替代 identity.readSensitive 绑定详情。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 最近登录页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalLoginEventPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/authorization-denials:
    get:
      operationId: listPrincipalAuthorizationDenials
      summary: 查询主体授权拒绝安全活动流
      description: |
        M419：硬门禁 identity.read；soft-gate authorization.read。
        按被拒主体（actor）读取 AUTHORIZATION_DENIED 审计，不并入 change-timeline。
        缺 authorization.read 时返回 items=[] 且 omitted=true，不伪造“近期无拒绝”。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 授权拒绝安全活动页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalAuthorizationDenialPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/change-timeline:
    get:
      operationId: listPrincipalChangeTimeline
      summary: 查询主体变更时间线
      description: |
        M405/M415/M416/M417/M418/M420：需要 identity.read。
        聚合生命周期、非冗余审计、成功登录；并 soft-gate 合并组织任职（organization.read）、
        RoleGrant（authorization.read）、网点任职/师傅服务关系/师傅档案生命周期与客户端种类声明
        （network.read）事实。缺权来源列入 omittedSources，不伪造空成功。
        不包含 AUTHORIZATION_DENIED（见独立安全活动流）。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 变更时间线
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalChangeTimelinePage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/identities:
    get:
      operationId: listPrincipalIdentityLinks
      summary: 读取主体的敏感外部身份绑定
      description: 需要独立的 identity.readSensitive 高风险能力。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 不可变身份绑定列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/IdentityLink' } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/identity-links:
    post:
      operationId: linkPrincipalIdentity
      summary: 为现有主体追加外部身份
      description: 身份绑定不可修改或删除；同一 tenant/issuer/subject 只能绑定一个主体。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LinkIdentityRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/SecurityPrincipalCommandResult' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}:disable:
    post:
      operationId: disableSecurityPrincipal
      summary: 停用统一主体
      description: 停用提交后，所有已绑定身份的旧 JWT 在下一次请求解析时立即失败关闭。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalLifecycleReasonRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/SecurityPrincipalCommandResult' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}:enable:
    post:
      operationId: enableSecurityPrincipal
      summary: 重新启用统一主体
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalLifecycleReasonRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/SecurityPrincipalCommandResult' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}:update-profile:
    post:
      operationId: updateSecurityPrincipalProfile
      summary: 更新主体 PersonProfile
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdatePrincipalProfileRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/SecurityPrincipalCommandResult' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/personas:
    post:
      operationId: addSecurityPrincipalPersona
      summary: 为主体追加 Persona
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AddPrincipalPersonaRequest' } } }
      responses:
        '200':
          description: 新增 Persona
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalPersona' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations:
    get:
      operationId: listOrganizations
      summary: 查询当前租户企业组织目录
      description: 需要 organization.read。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 组织列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrganizationPage' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createOrganization
      summary: 创建企业组织
      description: 需要 organization.manageStructure；EXTERNAL_AUTHORITATIVE 必须提供 sourceSystem/sourceKey。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateOrganizationRequest' } } }
      responses:
        '200':
          description: 新建组织
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/Organization' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}:
    get:
      operationId: getOrganization
      summary: 读取企业组织及单元列表
      description: 需要 organization.read。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 组织详情
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrganizationDetail' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}/units:
    get:
      operationId: listOrganizationUnits
      summary: 列出组织单元
      description: 需要 organization.read；asTree 预留树形响应，当前返回扁平列表。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - { name: asTree, in: query, schema: { type: boolean, default: false } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 组织单元列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/OrgUnit' } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createOrganizationUnit
      summary: 创建组织单元并维护 closure
      description: 需要 organization.manageStructure；EXTERNAL_AUTHORITATIVE 另需 organization.overrideExternal。If-Match 绑定组织聚合版本。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateOrgUnitRequest' } } }
      responses:
        '200':
          description: 新建单元
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnit' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}/units/{orgUnitId}:move:
    post:
      operationId: moveOrganizationUnit
      summary: 移动组织单元并原子重建 closure
      description: 需要 organization.manageStructure；循环与跨组织父节点失败关闭。If-Match 绑定单元聚合版本。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/OrgUnitId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MoveOrgUnitRequest' } } }
      responses:
        '200':
          description: 移动后的单元
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnit' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}/memberships:
    get:
      operationId: listOrganizationMemberships
      summary: 查询组织任职
      description: 需要 organization.read；可按 principalId 过滤。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - { name: principalId, in: query, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 任职页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgMembershipPage' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createOrganizationMembership
      summary: 创建组织任职
      description: 需要 organization.manageMembership；同一主体同时只能有一条有效 PRIMARY。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateOrgMembershipRequest' } } }
      responses:
        '200':
          description: 新建任职
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgMembership' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /org-memberships:
    get:
      operationId: listOrgMembershipSummaries
      summary: 按主体查询组织任职摘要
      description: |
        M404：需要 organization.read。返回组织/单元显示名，供 Admin 用户详情组织归属使用。
      parameters:
        - name: principalId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { enum: [ACTIVE, TERMINATED] }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 任职摘要页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgMembershipSummaryPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /org-memberships/{membershipId}:transfer:
    post:
      operationId: transferOrganizationMembership
      summary: 调动任职到新单元
      description: 旧任职终止并创建新任职历史；If-Match 绑定任职聚合版本。
      parameters:
        - $ref: '#/components/parameters/MembershipId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/TransferOrgMembershipRequest' } } }
      responses:
        '200':
          description: 调动后的任职
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgMembership' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /org-memberships/{membershipId}:terminate:
