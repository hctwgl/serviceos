        searchedTypes:
          type: array
          items: { enum: [WORK_ORDER, EXTERNAL_ORDER, NETWORK, TECHNICIAN] }
        omittedTypes:
          type: array
          items: { enum: [WORK_ORDER, EXTERNAL_ORDER, NETWORK, TECHNICIAN] }
