        technicianServiceAssignmentId: { type: string, format: uuid }
        networkAssigneeId: { type: string, minLength: 1, maxLength: 128 }
        technicianAssigneeId: { type: string, minLength: 1, maxLength: 128 }
        occurredAt: { type: string, format: date-time }
    ReleaseHumanTaskRequest:
      type: object
