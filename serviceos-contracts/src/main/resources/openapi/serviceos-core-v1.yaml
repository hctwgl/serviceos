        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: EvidenceItem 与 Revisions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceItem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /evidence-revisions/{revisionId}:invalidate:
    post:
      operationId: invalidateEvidenceRevision
      summary: 作废已通过机器校验的资料版本
      description: |
        仅允许 VALIDATED → INVALIDATED。reasonCode 必填；approvalRef 可选。
        同事务刷新槽位投影并写出审计与 Outbox；不改写历史 EvidenceSetSnapshot。
      parameters:
        - name: revisionId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
