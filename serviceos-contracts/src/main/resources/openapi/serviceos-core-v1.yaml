        evidence 编排 files BeginUpload；要求 evidence.submit、file.upload、当前责任人与未 Guard 的
        RUNNING HUMAN Task。CaptureMetadata 由服务端规范化；客户端 onBehalfOf/delegationRef/onBehalfReason
        在 Admin 路径仍失败关闭（M38）；代补仅经 Network Portal M201 命令级字段启用。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BeginEvidenceUploadRequest' }
