      properties:
        reason: { type: string, minLength: 1, maxLength: 1000 }
        triggerRef: { type: string, minLength: 1, maxLength: 160 }
        approvalRef: { type: [string, 'null'], maxLength: 160 }
    ReviewDecision:
      type: object
      additionalProperties: false
      required: [reviewDecisionId, reviewCaseId, decisionOrdinal, decision, reasonCodes, decidedBy, decidedAt]
      properties:
        reviewDecisionId: { type: string, format: uuid }
        reviewCaseId: { type: string, format: uuid }
        decisionOrdinal: { type: integer, minimum: 1 }
        decision: { enum: [APPROVED, REJECTED, FORCE_APPROVED] }
        decisionSource: { enum: [INTERNAL, EXTERNAL], default: INTERNAL }
        reasonCodes:
          type: array
          maxItems: 20
          items: { type: string, minLength: 1, maxLength: 80 }
        note: { type: [string, 'null'], maxLength: 1000 }
        approvalRef: { type: [string, 'null'], maxLength: 160 }
        decidedBy: { type: string, minLength: 1, maxLength: 128 }
        decidedAt: { type: string, format: date-time }
    ResubmitCorrectionCaseRequest:
      type: object
      additionalProperties: false
      required: [evidenceSetSnapshotId]
      properties:
        evidenceSetSnapshotId: { type: string, format: uuid }
    CloseCorrectionCaseRequest:
      type: object
      additionalProperties: false
      properties:
        note: { type: string, maxLength: 1000 }
    WaiveCorrectionCaseRequest:
      type: object
      additionalProperties: false
      required: [reason, approvalRef]
      properties:
        reason: { type: string, minLength: 1, maxLength: 1000 }
        approvalRef: { type: string, minLength: 1, maxLength: 160 }
    CorrectionResubmission:
      type: object
      additionalProperties: false
      required:
        - correctionResubmissionId
        - correctionCaseId
        - resubmissionOrdinal
        - evidenceSetSnapshotId
        - snapshotContentDigest
        - submittedBy
        - submittedAt
      properties:
        correctionResubmissionId: { type: string, format: uuid }
        correctionCaseId: { type: string, format: uuid }
        resubmissionOrdinal: { type: integer, minimum: 1 }
        evidenceSetSnapshotId: { type: string, format: uuid }
        snapshotContentDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        submittedBy: { type: string }
        submittedAt: { type: string, format: date-time }
    CorrectionCase:
      type: object
      additionalProperties: false
      required:
        - correctionCaseId
        - projectId
        - taskId
        - sourceReviewCaseId
        - sourceReviewDecisionId
        - sourceEvidenceSetSnapshotId
        - sourceSnapshotContentDigest
        - reasonCodes
        - status
        - createdBy
        - createdAt
        - resubmissions
      properties:
        correctionCaseId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        sourceReviewCaseId: { type: string, format: uuid }
        sourceReviewDecisionId: { type: string, format: uuid }
        sourceEvidenceSetSnapshotId: { type: string, format: uuid }
        sourceSnapshotContentDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        reasonCodes:
          type: array
          maxItems: 20
          items: { type: string, minLength: 1, maxLength: 80 }
        correctionTaskId: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [OPEN, IN_PROGRESS, RESUBMITTED, CLOSED, WAIVED] }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        latestResubmissionSnapshotId: { type: string, format: uuid, nullable: true }
        closedBy: { type: string, nullable: true }
        closedAt: { type: string, format: date-time, nullable: true }
        waivedBy: { type: string, nullable: true }
        waivedAt: { type: string, format: date-time, nullable: true }
        waiveApprovalRef: { type: string, nullable: true, maxLength: 160 }
        waiveNote: { type: string, nullable: true, maxLength: 1000 }
        resubmissions:
          type: array
          items: { $ref: '#/components/schemas/CorrectionResubmission' }

    ReviewCase:
      type: object
      additionalProperties: false
      required: [reviewCaseId, projectId, taskId, evidenceSetSnapshotId, snapshotContentDigest,
                 scopeType, origin, policyVersion, status, createdBy, createdAt, decisions]
      properties:
        reviewCaseId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        evidenceSetSnapshotId: { type: string, format: uuid }
        snapshotContentDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        scopeType: { enum: [EVIDENCE_SET_SNAPSHOT] }
        origin: { enum: [INTERNAL, CLIENT] }
        policyVersion: { type: string, minLength: 1, maxLength: 80 }
        status: { enum: [OPEN, APPROVED, REJECTED, FORCE_APPROVED, REOPENED] }
        createdBy: { type: string, minLength: 1, maxLength: 128 }
        createdAt: { type: string, format: date-time }
        decidedAt: { type: [string, 'null'], format: date-time }
        sourceReviewCaseId: { type: [string, 'null'], format: uuid }
        externalSubmissionRef: { type: [string, 'null'], maxLength: 160 }
        callbackBatchRef: { type: [string, 'null'], maxLength: 160 }
        mappingVersionId: { type: [string, 'null'], maxLength: 160 }
        reopenedFromReviewCaseId: { type: [string, 'null'], format: uuid }
        reopenTriggerRef: { type: [string, 'null'], maxLength: 160 }
        decisions:
          type: array
          items: { $ref: '#/components/schemas/ReviewDecision' }

    InvalidateEvidenceRevisionRequest:
      type: object
      additionalProperties: false
      required: [reasonCode]
      properties:
        reasonCode: { type: string, minLength: 1, maxLength: 80 }
        approvalRef: { type: [string, 'null'], maxLength: 160 }
    EvidenceItem:
      type: object
      additionalProperties: false
      required: [evidenceItemId, taskId, projectId, evidenceSlotId, itemOrdinal, status,
                 createdBy, createdAt, revisions]
      properties:
        evidenceItemId: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        evidenceSlotId: { type: string, format: uuid }
        itemOrdinal: { type: integer, minimum: 1 }
        status: { enum: [OPEN, SUBMITTED, UNDER_REVIEW, ACCEPTED, REJECTED, LOCKED] }
        createdBy: { type: string, minLength: 1, maxLength: 128 }
        createdAt: { type: string, format: date-time }
        revisions:
          type: array
          items: { $ref: '#/components/schemas/EvidenceRevision' }
    CreateEvidenceSetSnapshotRequest:
      type: object
      additionalProperties: false
      required: [purpose, memberRevisionIds]
      properties:
        purpose: { enum: [TASK_SUBMISSION] }
        memberRevisionIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
    EvidenceSetSnapshotMember:
      type: object
      additionalProperties: false
      required: [memberId, evidenceSlotId, evidenceItemId, evidenceRevisionId, revisionNumber,
                 revisionStatus, contentDigest, validationDigest, memberOrdinal]
      properties:
        memberId: { type: string, format: uuid }
        evidenceSlotId: { type: string, format: uuid }
        evidenceItemId: { type: string, format: uuid }
        evidenceRevisionId: { type: string, format: uuid }
        revisionNumber: { type: integer, minimum: 1 }
        revisionStatus: { enum: [VALIDATED] }
        contentDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        validationDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        memberOrdinal: { type: integer, minimum: 1 }
    EvidenceSetSnapshot:
      type: object
      additionalProperties: false
      required: [evidenceSetSnapshotId, taskId, projectId, resolutionId, purpose, memberCount,
                 contentDigest, eligibilitySummary, createdBy, createdAt, members]
      properties:
        evidenceSetSnapshotId: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        resolutionId: { type: string, format: uuid }
        purpose: { enum: [TASK_SUBMISSION] }
        memberCount: { type: integer, minimum: 0 }
        contentDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        eligibilitySummary: { type: object, additionalProperties: true }
        createdBy: { type: string, minLength: 1, maxLength: 128 }
        createdAt: { type: string, format: date-time }
        members:
          type: array
          items: { $ref: '#/components/schemas/EvidenceSetSnapshotMember' }
    SubmitFormRequest:
      type: object
      additionalProperties: false
      required: [formVersionId, values]
      properties:
        formVersionId: { type: string, format: uuid }
        values: { type: object, additionalProperties: true }
        prefillVersion: { type: [string, 'null'], minLength: 1, maxLength: 160 }
    FormValidationIssue:
      type: object
      additionalProperties: false
      required: [fieldKey, code, message]
      properties:
        fieldKey: { type: string }
        code: { enum: [FIELD_REQUIRED, FIELD_UNKNOWN, FIELD_TYPE_INVALID] }
        message: { type: string }
    FormSubmission:
      type: object
      additionalProperties: false
      required: [submissionId, taskId, projectId, formVersionId, formKey, submissionVersion,
                 values, contentDigest, validationStatus, errors, warnings, prefillVersion,
                 submittedBy, submittedAt]
      properties:
        submissionId: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        formVersionId: { type: string, format: uuid }
        formKey: { type: string, minLength: 1, maxLength: 120 }
        submissionVersion: { type: integer, minimum: 1 }
        values: { type: object, additionalProperties: true }
        contentDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        validationStatus: { enum: [VALIDATED, INVALID] }
        errors:
          type: array
          items: { $ref: '#/components/schemas/FormValidationIssue' }
        warnings:
          type: array
          items: { $ref: '#/components/schemas/FormValidationIssue' }
        prefillVersion: { type: [string, 'null'] }
        submittedBy: { type: string }
        submittedAt: { type: string, format: date-time }
    VisitLocation:
      type: object
      additionalProperties: false
      required: [latitude, longitude, accuracyMeters]
      properties:
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        accuracyMeters: { type: number, exclusiveMinimum: 0, maximum: 10000 }
    CheckInVisitRequest:
      type: object
      additionalProperties: false
      required: [capturedAt, deviceCommandId, deviceId, location, offline]
      properties:
        capturedAt: { type: string, format: date-time }
        deviceCommandId: { type: string, minLength: 1, maxLength: 160 }
        deviceId: { type: string, minLength: 1, maxLength: 160 }
        location: { $ref: '#/components/schemas/VisitLocation' }
        offline: { type: boolean }
    CheckOutVisitRequest:
      type: object
      additionalProperties: false
      required: [capturedAt, resultCode, operationRefs]
      properties:
        capturedAt: { type: string, format: date-time }
        resultCode: { type: string, pattern: '^[A-Z][A-Z0-9_]{1,99}$' }
        operationRefs:
          type: array
          minItems: 1
          maxItems: 50
          items: { type: string, minLength: 1, maxLength: 500 }
    InterruptVisitRequest:
      type: object
      additionalProperties: false
      required: [capturedAt, exceptionCode, evidenceRefs]
      properties:
        capturedAt: { type: string, format: date-time }
        exceptionCode: { type: string, pattern: '^[A-Z][A-Z0-9_]{1,99}$' }
        note: { type: [string, 'null'], maxLength: 500 }
        evidenceRefs:
          type: array
          maxItems: 50
          items: { type: string, minLength: 1, maxLength: 500 }
    VisitCommandReceipt:
      type: object
      additionalProperties: false
      required: [visitId, status, aggregateVersion, geofenceResult, policyDecision, occurredAt]
      properties:
        visitId: { type: string, format: uuid }
        status: { enum: [IN_PROGRESS, COMPLETED, INTERRUPTED] }
        aggregateVersion: { type: integer, format: int64, minimum: 1 }
        geofenceResult: { enum: [WITHIN_GEOFENCE, OUTSIDE_GEOFENCE, LOCATION_UNAVAILABLE, LOW_ACCURACY] }
        policyDecision: { enum: [ACCEPTED, WARNING] }
        occurredAt: { type: string, format: date-time }
    Visit:
      type: object
      additionalProperties: false
      required: [visitId, projectId, workOrderId, taskId, appointmentId, visitSequence,
                 technicianId, networkId, status, checkInCapturedAt, checkInReceivedAt,
                 checkInLocation, geofenceResult, geofenceDistanceMeters, geofencePolicyVersion,
                 policyDecision, deviceId, deviceCommandId, offline, checkOutCapturedAt,
                 checkOutReceivedAt, resultCode, exceptionCode, note, operationRefs,
                 evidenceRefs, aggregateVersion, allowedActions]
      properties:
        visitId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        workOrderId: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        appointmentId: { type: string, format: uuid }
        visitSequence: { type: integer, minimum: 1 }
        technicianId: { type: string, minLength: 1, maxLength: 128 }
        networkId: { type: [string, 'null'] }
        status: { enum: [IN_PROGRESS, COMPLETED, INTERRUPTED] }
        checkInCapturedAt: { type: string, format: date-time }
        checkInReceivedAt: { type: string, format: date-time }
        checkInLocation: { $ref: '#/components/schemas/VisitLocation' }
        geofenceResult: { enum: [WITHIN_GEOFENCE, OUTSIDE_GEOFENCE, LOCATION_UNAVAILABLE, LOW_ACCURACY] }
        geofenceDistanceMeters: { type: [number, 'null'], minimum: 0 }
        geofencePolicyVersion: { type: [string, 'null'] }
        policyDecision: { enum: [ACCEPTED, WARNING] }
        deviceId: { type: string }
        deviceCommandId: { type: string }
        offline: { type: boolean }
        checkOutCapturedAt: { type: [string, 'null'], format: date-time }
        checkOutReceivedAt: { type: [string, 'null'], format: date-time }
        resultCode: { type: [string, 'null'] }
        exceptionCode: { type: [string, 'null'] }
        note: { type: [string, 'null'] }
        operationRefs: { type: array, items: { type: string } }
        evidenceRefs: { type: array, items: { type: string } }
        aggregateVersion: { type: integer, format: int64, minimum: 1 }
        allowedActions:
          type: array
          items: { enum: [visit.checkOut, visit.interrupt] }
    Problem:
      type: object
      required: [type, title, status, errorCode]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        errorCode: { type: string }
        correlationId: { type: [string, 'null'] }
  responses:
    VisitCommandReceipt:
      description: Visit 命令成功或返回首次幂等冻结响应
      headers:
        ETag: { required: true, schema: { type: string } }
        X-Correlation-Id: { required: true, schema: { type: string } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/VisitCommandReceipt' }
    AppointmentCommandReceipt:
      description: 命令成功或返回首次幂等冻结响应
      headers:
        ETag:
          required: true
          schema: { type: string }
        X-Correlation-Id:
          required: true
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AppointmentCommandReceipt' }
    OperationalExceptionAcknowledgement:
      description: 确认成功或幂等重放成功
      headers:
        ETag:
          required: true
          schema: { type: string }
        X-Correlation-Id:
          required: true
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/OperationalExceptionAcknowledgement' }
    HumanTaskCommandReceipt:
      description: 命令成功或幂等重放成功
      headers:
        ETag:
          required: true
          schema: { type: string }
        X-Correlation-Id:
          required: true
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/HumanTaskCommandReceipt' }
    ReleasedHumanTaskReceipt:
      description: 释放成功或幂等重放成功
      headers:
        ETag:
          required: true
          schema: { type: string }
        X-Correlation-Id:
          required: true
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ReleasedHumanTaskReceipt' }
    Problem:
      description: RFC 9457 Problem Details
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
