        latestResubmissionSnapshotId: { type: [string, 'null'], format: uuid }
        closedAt: { type: [string, 'null'], format: date-time }
        waivedAt: { type: [string, 'null'], format: date-time }
        resubmissionCount: { type: integer, minimum: 0, maximum: 1000 }
    NetworkPortalCorrectionPage:
      type: object
      additionalProperties: false
      required: [networkId, items, asOf]
      properties:
        networkId: { type: string, format: uuid }
        items: { type: array, maxItems: 100, items: { $ref: '#/components/schemas/NetworkPortalCorrectionItem' } }
        asOf: { type: string, format: date-time }
    NetworkPortalExceptionItem:
      type: object
