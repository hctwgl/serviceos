          type: array
          maxItems: 50
          description: |
            M411：今日预约非 PII 列表（时间/任务/师傅/状态）；需 manageAppointment；缺能力时省略。
          items: { $ref: '#/components/schemas/NetworkPortalWorkbenchAppointmentItem' }
        todayTimeline:
          type: array
          minItems: 1
          maxItems: 8
          description: |
