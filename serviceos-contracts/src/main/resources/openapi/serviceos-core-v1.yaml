          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaskAssignmentBatchReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/service-assignments:manual-assign:
    post:
      operationId: manualAssignServiceAssignments
      summary: Admin 人工初派网点与师傅服务责任
      description: >-
        窄化试点命令：确保容量后经 ServiceAssignment 激活 saga 同事务落到 ACTIVE NETWORK +
        TECHNICIAN。不执行评分/硬过滤/DispatchRequest，不支持改派；能力为
        dispatch.assignment.manage 与 dispatch.capacity.configure。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
