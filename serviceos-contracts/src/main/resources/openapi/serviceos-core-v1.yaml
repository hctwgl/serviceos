          description: 双责任已激活或幂等回放
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManualServiceAssignmentReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /tasks/{taskId}/service-assignments:manual-assign-network:
    post:
      operationId: manualAssignNetworkServiceAssignment
      summary: Admin 初审派网点（仅 NETWORK 责任）
      description: >-
