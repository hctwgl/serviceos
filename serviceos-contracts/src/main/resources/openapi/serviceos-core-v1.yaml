      type: object
      additionalProperties: false
      required: [items, nextCursor, asOf, totalCount, totalCountTruncated]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/WorkOrder' } }
        nextCursor: { type: [string, 'null'] }
        asOf: { type: string, format: date-time }
        totalCount:
          type: integer
          minimum: 0
          maximum: 100
          description: >
            M436：当前筛选条件下授权工单总数（不含 cursor）；上限 100。
            与本页 items 长度无关；超过上限时为 100 且 totalCountTruncated=true。
        totalCountTruncated:
          type: boolean
          description: >
            M436：匹配数超过 100 时为 true；不返回精确全量 COUNT(*)。
        slaRiskSummaries:
          description: |
            M434：需 PROJECT sla.read；缺能力时省略本属性；有能力且无开放风险时返回 []。
            按本页工单聚合 RUNNING∪BREACHED；仅含 openCount>0 行。不伪造 0 伪装无权限。
