      operationId: decideReviewCase
      summary: 对 OPEN ReviewCase 追加 APPROVED/REJECTED 决定
      description: |
        决定只追加；Case 状态投影写为 APPROVED 或 REJECTED。
        REJECTED 至少需要一个 reasonCode。已裁决案例不可再裁决。
