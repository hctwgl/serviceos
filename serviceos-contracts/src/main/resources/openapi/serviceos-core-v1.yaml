  /inbound-envelopes:
    get:
      operationId: listAuthorizedInboundEnvelopes
      summary: 查询当前主体有权查看的入站 Envelope 队列
      description: >-
        API-06 §6.1 窄切片（M158）；默认 processingStatus=RECEIVED，按 receivedAt/id 倒序稳定分页。
        需要 integration.readInbound；仅返回已绑定 projectId 的安全摘要；游标绑定实时项目范围和全部筛选。
        不返回 digest、对象引用、签名原文或传输凭据。
      parameters:
        - { name: projectId, in: query, schema: { type: string, format: uuid } }
        - { name: processingStatus, in: query, schema: { enum: [RECEIVED, COMPLETED, REJECTED], default: RECEIVED } }
        - { name: messageType, in: query, schema: { enum: [CREATE_WORK_ORDER, RECORD_CLIENT_REVIEW_RESULT] } }
        - { name: resultType, in: query, schema: { type: string, minLength: 1, maxLength: 80 } }
        - { name: resultId, in: query, schema: { type: string, minLength: 1, maxLength: 160 } }
        - { name: canonicalMessageId, in: query, schema: { type: string, format: uuid } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 入站 Envelope 队列页
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InboundEnvelopeQueuePage' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /inbound-envelopes/{envelopeId}:
    get:
      operationId: getInboundEnvelope
      summary: 查询入站消息安全摘要
      description: 需要 integration.readInbound 与实时 tenant/project scope；不返回原文对象引用、签名或传输凭据。
      parameters:
        - name: envelopeId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
