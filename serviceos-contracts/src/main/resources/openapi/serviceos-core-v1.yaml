openapi: 3.1.0
info:
  title: ServiceOS Core API
  version: 0.95.0
  description: 首条工程纵向切片的机器可读契约；实现与客户端均不得绕过本契约自行猜测字段。
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /security-principals:
    get:
      operationId: listSecurityPrincipals
      summary: 分页查询当前租户的统一主体目录
      description: 需要 identity.read；普通目录不返回 issuer、subject 等敏感身份绑定。
      parameters:
        - { name: query, in: query, schema: { type: string, minLength: 1, maxLength: 200 } }
        - { name: status, in: query, schema: { enum: [ACTIVE, DISABLED] } }
        - { name: cursor, in: query, schema: { type: string, minLength: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: displayName/principalId 正序的主体页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SecurityPrincipalPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}:
    get:
      operationId: getSecurityPrincipal
      summary: 读取统一主体及 Persona
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 主体当前事实，不含敏感身份绑定
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SecurityPrincipalDetail' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/identities:
    get:
      operationId: listPrincipalIdentityLinks
      summary: 读取主体的敏感外部身份绑定
      description: 需要独立的 identity.readSensitive 高风险能力。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 不可变身份绑定列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/IdentityLink' } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/identity-links:
    post:
      operationId: linkPrincipalIdentity
      summary: 为现有主体追加外部身份
      description: 身份绑定不可修改或删除；同一 tenant/issuer/subject 只能绑定一个主体。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LinkIdentityRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/SecurityPrincipalCommandResult' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}:disable:
    post:
      operationId: disableSecurityPrincipal
      summary: 停用统一主体
      description: 停用提交后，所有已绑定身份的旧 JWT 在下一次请求解析时立即失败关闭。
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalLifecycleReasonRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/SecurityPrincipalCommandResult' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}:enable:
    post:
      operationId: enableSecurityPrincipal
      summary: 重新启用统一主体
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalLifecycleReasonRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/SecurityPrincipalCommandResult' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}:update-profile:
    post:
      operationId: updateSecurityPrincipalProfile
      summary: 更新主体 PersonProfile
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdatePrincipalProfileRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/SecurityPrincipalCommandResult' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /security-principals/{principalId}/personas:
    post:
      operationId: addSecurityPrincipalPersona
      summary: 为主体追加 Persona
      parameters:
        - $ref: '#/components/parameters/PrincipalId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AddPrincipalPersonaRequest' } } }
      responses:
        '200':
          description: 新增 Persona
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/PrincipalPersona' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations:
    get:
      operationId: listOrganizations
      summary: 查询当前租户企业组织目录
      description: 需要 organization.read。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 组织列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrganizationPage' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createOrganization
      summary: 创建企业组织
      description: 需要 organization.manageStructure；EXTERNAL_AUTHORITATIVE 必须提供 sourceSystem/sourceKey。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateOrganizationRequest' } } }
      responses:
        '200':
          description: 新建组织
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/Organization' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}:
    get:
      operationId: getOrganization
      summary: 读取企业组织及单元列表
      description: 需要 organization.read。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 组织详情
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrganizationDetail' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}/units:
    get:
      operationId: listOrganizationUnits
      summary: 列出组织单元
      description: 需要 organization.read；asTree 预留树形响应，当前返回扁平列表。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - { name: asTree, in: query, schema: { type: boolean, default: false } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 组织单元列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/OrgUnit' } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createOrganizationUnit
      summary: 创建组织单元并维护 closure
      description: 需要 organization.manageStructure；EXTERNAL_AUTHORITATIVE 另需 organization.overrideExternal。If-Match 绑定组织聚合版本。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateOrgUnitRequest' } } }
      responses:
        '200':
          description: 新建单元
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnit' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}/units/{orgUnitId}:move:
    post:
      operationId: moveOrganizationUnit
      summary: 移动组织单元并原子重建 closure
      description: 需要 organization.manageStructure；循环与跨组织父节点失败关闭。If-Match 绑定单元聚合版本。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/OrgUnitId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MoveOrgUnitRequest' } } }
      responses:
        '200':
          description: 移动后的单元
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgUnit' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}/memberships:
    get:
      operationId: listOrganizationMemberships
      summary: 查询组织任职
      description: 需要 organization.read；可按 principalId 过滤。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - { name: principalId, in: query, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 任职页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgMembershipPage' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createOrganizationMembership
      summary: 创建组织任职
      description: 需要 organization.manageMembership；同一主体同时只能有一条有效 PRIMARY。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateOrgMembershipRequest' } } }
      responses:
        '200':
          description: 新建任职
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgMembership' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /org-memberships/{membershipId}:transfer:
    post:
      operationId: transferOrganizationMembership
      summary: 调动任职到新单元
      description: 旧任职终止并创建新任职历史；If-Match 绑定任职聚合版本。
      parameters:
        - $ref: '#/components/parameters/MembershipId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/TransferOrgMembershipRequest' } } }
      responses:
        '200':
          description: 调动后的任职
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgMembership' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /org-memberships/{membershipId}:terminate:
    post:
      operationId: terminateOrganizationMembership
      summary: 终止任职并可联动主体失权
      description: disablePrincipal=true 时同事务停用 Principal、撤销有效 RoleGrant 并创建待重分配清单。
      parameters:
        - $ref: '#/components/parameters/MembershipId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/TerminateOrgMembershipRequest' } } }
      responses:
        '200':
          description: 已终止任职
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/OrgMembership' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /organizations/{organizationId}/directory-sync-batches:
    post:
      operationId: submitOrganizationDirectorySyncBatch
      summary: 提交外部组织目录同步批次
      description: 需要 organization.sync；按 sourceSystem+externalBatchKey 幂等；乱序版本 SKIPPED。
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SubmitDirectorySyncBatchRequest' } } }
      responses:
        '200':
          description: 同步批次收据
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/DirectorySyncBatch' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /directory-sync-batches/{batchId}:
    get:
      operationId: getDirectorySyncBatch
      summary: 读取同步批次与逐项结果
      description: 需要 organization.read。
      parameters:
        - $ref: '#/components/parameters/DirectorySyncBatchId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 同步批次详情
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/DirectorySyncBatch' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /reassignment-work-items:
    get:
      operationId: listOpenReassignmentWorkItems
      summary: 列出因任职终止产生的待重分配清单
      description: 需要 organization.read。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: OPEN 待办页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/ReassignmentWorkItemPage' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }

  /partner-organizations:
    get:
      operationId: listPartnerOrganizations
      summary: 查询合作组织目录
      description: 需要 network.read；合作组织不进入内部 OrgUnit closure。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 合作组织页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/PartnerOrganizationPage' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createPartnerOrganization
      summary: 创建合作组织
      description: 需要 network.managePartner。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreatePartnerOrganizationRequest' } } }
      responses:
        '200':
          description: 新建合作组织
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/PartnerOrganization' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /partner-organizations/{partnerOrganizationId}:
    get:
      operationId: getPartnerOrganization
      summary: 读取合作组织
      parameters:
        - $ref: '#/components/parameters/PartnerOrganizationId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 合作组织详情
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/PartnerOrganization' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /service-networks:
    get:
      operationId: listServiceNetworks
      summary: 查询 ServiceNetwork 目录
      description: 需要 network.read。
      parameters:
        - { name: partnerOrganizationId, in: query, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 网点页
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/ServiceNetworkPage' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createServiceNetwork
      summary: 创建 ServiceNetwork
      description: 需要 network.manageNetwork；网点不得进入内部组织 closure。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateServiceNetworkRequest' } } }
      responses:
        '200':
          description: 新建网点
          headers:
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/ServiceNetwork' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
