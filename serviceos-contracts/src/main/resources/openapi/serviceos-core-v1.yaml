        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/workbench:
    get:
      operationId: getNetworkPortalWorkbench
      summary: Network Portal 工作台计数摘要
      description: |
        M194：X-Network-Context + networkTask.read。返回 ACTIVE 工单/任务/师傅计数与容量摘要。
        M207：附加能力门控发现计数；缺 enrichment 能力时省略对应可选属性（不得用 null/0 伪装无权限）；
        unassignedTechnicianTaskCount 在基座成功时始终返回。
        M224：可选 `slaSummary`（openCount/breachedCount，语义同 M221）；需 NETWORK `sla.read`，
        缺能力时省略该属性（不得用 0 伪装无权限）；按本网点全部 ACTIVE taskIds 聚合。
        M411：可选 `todayAppointmentCount` / `todayAppointments` 需 NETWORK `networkPortal.manageAppointment`；
        运营日按 Asia/Shanghai；不含客户 PII。`todayTimeline` 始终返回（至少含待分配桶）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 工作台摘要
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalWorkbenchView' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/appointment-calendar:
    get:
      operationId: getNetworkPortalAppointmentCalendar
      summary: Network Portal 本网点预约日历
      description: |
        M413：X-Network-Context + NETWORK `networkPortal.manageAppointment`（硬门禁）。
        返回运营日 Asia/Shanghai 闭区间内与 ACTIVE 任务重叠的 PROPOSED/CONFIRMED 预约；
        按窗口开始日落日；不含客户 PII。默认 from=今天、to=from+13；跨度不得超过 31 天。
      parameters:
        - name: from
          in: query
          required: false
          schema: { type: string, format: date }
          description: 含当日；省略时为 Asia/Shanghai 今天
        - name: to
          in: query
          required: false
          schema: { type: string, format: date }
          description: 含当日；省略时为 from+13 天
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 预约日历
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalAppointmentCalendarView' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/tasks/{taskId}:accept-assignment:
