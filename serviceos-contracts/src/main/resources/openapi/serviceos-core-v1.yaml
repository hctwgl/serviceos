      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckOutVisitRequest' }
      responses:
        '200': { $ref: '#/components/responses/VisitCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /visits/{visitId}:interrupt:
    post:
      operationId: interruptVisit
      summary: 以受控异常码中断现场作业
      parameters:
        - $ref: '#/components/parameters/VisitId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InterruptVisitRequest' }
      responses:
        '200': { $ref: '#/components/responses/VisitCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /inbound-envelopes/{envelopeId}:
    get:
      operationId: getInboundEnvelope
      summary: 查询入站消息安全摘要
      description: 需要 integration.readInbound 与实时 tenant/project scope；不返回原文对象引用、签名或传输凭据。
      parameters:
        - name: envelopeId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 入站消息摘要
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InboundEnvelope' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /internal/integration/byd/review-routes:
    post:
      operationId: registerBydExternalReviewRoute
      summary: 登记 BYD 订单到 CLIENT ReviewCase 的权威回调路由
      description: >-
        仅允许获权 SERVICE principal 调用。请求中的提交引用、回调批次和映射版本必须与
        OPEN CLIENT ReviewCase 冻结事实完全一致；不得从订单号猜测 ReviewCase。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterExternalReviewRouteRequest' }
      responses:
        '201':
          description: 路由登记成功或幂等重放成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExternalReviewRoute' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /canonical-messages/{messageId}:
    get:
      operationId: getCanonicalMessage
      summary: 查询标准消息与领域命令结果摘要
      description: 需要 integration.readInbound 与实时 project scope；不返回包含个人信息的标准消息正文。
      parameters:
        - name: messageId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 标准消息摘要
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CanonicalMessage' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /internal/integration/byd/review-submissions:
    post:
      operationId: createBydReviewSubmission
      summary: 从已通过 INTERNAL ReviewCase 创建 BYD 提审交付
      description: >-
        仅允许获权 SERVICE principal 调用。服务端从已冻结的审核决定、Task 与 BYD
        CanonicalMessage 派生不可变 payload；未知外部结果不得自动重发。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBydReviewSubmissionRequest' }
      responses:
        '201':
          description: 交付意图已创建或返回同一业务交付
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutboundDelivery' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /outbound-deliveries/{deliveryId}:
    get:
      operationId: getOutboundDelivery
      summary: 查询外部交付及执行摘要
      description: >-
        需要 integration.readOutbound 与实时 tenant/project scope；不返回签名、凭据、
        payload/response 对象引用或原文。
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 外部交付安全摘要
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutboundDelivery' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /outbound-deliveries/{deliveryId}:retry:
    post:
      operationId: retryUnknownOutboundDelivery
      summary: 高风险人工重发 UNKNOWN 外部交付
      description: >-
        仅允许具备 integration.retryUnknownDelivery 的 USER principal 调用。必须携带原因、
        审批引用和预期聚合版本；复用同一不可变 payload 与外部幂等键，由新 Task 执行，
        不覆盖原 UNKNOWN attempt。
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RetryUnknownOutboundDeliveryRequest' }
      responses:
        '202':
          description: 人工重发请求及执行 Task 已原子登记
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeliveryReplayRequest' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 由受信 OIDC 提供方签发，必须包含 subject、tenant_id；token 中的能力声明不能替代 ServiceOS RoleGrant。
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OperationalExceptionId:
      name: exceptionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SlaInstanceId:
      name: slaInstanceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AppointmentId:
      name: appointmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VisitId:
      name: visitId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 双引号包裹的正整数聚合版本，例如 `"3"`。
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
  schemas:
    TaskDirectoryItem:
      type: object
      additionalProperties: false
      required: [id, projectId, workOrderId, taskType, taskKind, stageCode, priority, status,
        nextRunAt, claimedBy, attemptCount, maxAttempts, version, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        projectId: { type: [string, 'null'], format: uuid }
        workOrderId: { type: [string, 'null'], format: uuid }
        taskType: { type: string }
        taskKind: { enum: [HUMAN, AUTOMATED] }
        stageCode: { type: [string, 'null'] }
        priority: { type: integer, minimum: 0, maximum: 1000 }
        status: { enum: [READY, PENDING, CLAIMED, RUNNING, RETRY_WAIT, SUCCEEDED, COMPLETED, MANUAL_INTERVENTION, CANCELLED] }
        nextRunAt: { type: string, format: date-time }
        claimedBy: { type: [string, 'null'] }
        attemptCount: { type: integer, minimum: 0 }
        maxAttempts: { type: integer, minimum: 1 }
        version: { type: integer, format: int64, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    TaskDirectoryPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, asOf]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/TaskDirectoryItem' } }
        nextCursor: { type: [string, 'null'] }
        asOf: { type: string, format: date-time }
    TaskDetail:
      type: object
      additionalProperties: false
      required: [task, workflowInstanceId, stageInstanceId, workflowNodeInstanceId, workflowNodeId,
        workflowDefinitionVersionId, workflowDefinitionDigest, configurationBundleId,
        configurationBundleDigest, formRef, responsibleUserId, candidateUserIds, claimedAt,
        startedAt, completedAt, resultRef, resultDigest, inputVersionRefs, asOf]
      properties:
        task: { $ref: '#/components/schemas/TaskDirectoryItem' }
        workflowInstanceId: { type: [string, 'null'], format: uuid }
        stageInstanceId: { type: [string, 'null'], format: uuid }
        workflowNodeInstanceId: { type: [string, 'null'], format: uuid }
        workflowNodeId: { type: [string, 'null'] }
        workflowDefinitionVersionId: { type: [string, 'null'], format: uuid }
        workflowDefinitionDigest: { type: [string, 'null'], pattern: '^[0-9a-f]{64}$' }
        configurationBundleId: { type: [string, 'null'], format: uuid }
        configurationBundleDigest: { type: [string, 'null'], pattern: '^[0-9a-f]{64}$' }
        formRef: { type: [string, 'null'] }
        responsibleUserId: { type: [string, 'null'] }
        candidateUserIds: { type: array, items: { type: string } }
        claimedAt: { type: [string, 'null'], format: date-time }
        startedAt: { type: [string, 'null'], format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
        resultRef: { type: [string, 'null'] }
        resultDigest: { type: [string, 'null'], pattern: '^[0-9a-f]{64}$' }
        inputVersionRefs: { type: array, items: { $ref: '#/components/schemas/InputVersionRef' } }
        asOf: { type: string, format: date-time }
    TaskAllowedAction:
      type: object
      additionalProperties: false
      required: [code, label, inputSchemaRef, obligations]
      properties:
        code: { enum: [task.claim, task.start, task.complete, task.release] }
        label: { type: string, minLength: 1, maxLength: 80 }
        inputSchemaRef:
          type: [string, 'null']
          enum:
            - null
            - '#/components/schemas/CompleteHumanTaskRequest'
            - '#/components/schemas/ReleaseHumanTaskRequest'
        obligations:
          type: array
          uniqueItems: true
          maxItems: 4
          items: { enum: [REQUIRE_REASON, REQUIRE_RESULT] }
    TaskAllowedActions:
      type: object
      additionalProperties: false
      required: [resourceVersion, actions, asOf]
      properties:
        resourceVersion: { type: integer, format: int64, minimum: 1 }
        actions:
          type: array
          maxItems: 4
          items: { $ref: '#/components/schemas/TaskAllowedAction' }
        asOf: { type: string, format: date-time }
    TaskExecutionAttempt:
      type: object
      additionalProperties: false
      required: [attemptId, attemptNo, resultCode, errorCode, resultRef, nextRetryAt, startedAt, finishedAt]
      properties:
        attemptId: { type: string, format: uuid }
        attemptNo: { type: integer, minimum: 1 }
        resultCode: { enum: [RUNNING, SUCCEEDED, RETRYABLE_FAILURE, FINAL_FAILURE, UNKNOWN, LEASE_EXPIRED] }
        errorCode: { type: [string, 'null'], minLength: 1, maxLength: 100 }
        resultRef: { type: [string, 'null'], minLength: 1, maxLength: 500 }
        nextRetryAt: { type: [string, 'null'], format: date-time }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: [string, 'null'], format: date-time }
    TaskExecutionAttemptPage:
      type: object
      additionalProperties: false
      required: [resourceVersion, items, nextCursor, asOf]
      properties:
        resourceVersion: { type: integer, format: int64, minimum: 1 }
        items:
          type: array
          maxItems: 100
          items: { $ref: '#/components/schemas/TaskExecutionAttempt' }
        nextCursor: { type: [string, 'null'] }
        asOf: { type: string, format: date-time }
    WorkOrder:
      type: object
      additionalProperties: false
      required: [id, tenantId, projectId, clientCode, brandCode, serviceProductCode, externalOrderCode,
        status, configurationBundleId, configurationBundleCode, configurationBundleVersion,
        configurationBundleDigest, provinceCode, cityCode, districtCode, externalDispatchedAt,
        receivedAt, version]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string }
        projectId: { type: string, format: uuid }
        clientCode: { type: string }
        brandCode: { type: string }
        serviceProductCode: { type: string }
        externalOrderCode: { type: string }
        status: { enum: [RECEIVED, ACTIVE, FULFILLED] }
        configurationBundleId: { type: string, format: uuid }
        configurationBundleCode: { type: string }
        configurationBundleVersion: { type: string }
        configurationBundleDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        provinceCode: { type: string }
        cityCode: { type: string }
        districtCode: { type: string }
        externalDispatchedAt: { type: string, format: date-time }
        receivedAt: { type: string, format: date-time }
        activatedAt: { type: [string, 'null'], format: date-time }
        fulfilledAt: { type: [string, 'null'], format: date-time }
        version: { type: integer, format: int64, minimum: 1 }
    WorkOrderPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, asOf]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/WorkOrder' } }
        nextCursor: { type: [string, 'null'] }
        asOf: { type: string, format: date-time }
    WorkOrderDetail:
      type: object
      additionalProperties: false
      required: [workOrder, asOf]
      properties:
        workOrder: { $ref: '#/components/schemas/WorkOrder' }
        asOf: { type: string, format: date-time }
    WorkOrderTimelineItem:
      type: object
      additionalProperties: false
      required: [id, category, eventType, schemaVersion, occurredAt, receivedAt, actorId,
        resourceType, resourceId, resourceVersion, resourceCode, outcomeCode, correlationId,
        displayTemplateCode, displayTemplateVersion]
      properties:
        id: { type: string, format: uuid }
        # 时间线会持续合并新领域事件；使用可扩展枚举，客户端必须容忍未知值。
        category: { x-extensible-enum: [WORK_ORDER, WORKFLOW, STAGE, TASK, APPOINTMENT, VISIT, CONTACT_ATTEMPT, SLA, FORM, EVIDENCE, REVIEW, CORRECTION, DELIVERY, EXCEPTION, ASSIGNMENT] }
        eventType:
          x-extensible-enum: [workorder.received, workorder.activated, workorder.fulfilled,
            workflow.started, workflow.completed, stage.activated, stage.completed,
            task.created, task.claimed, task.started, task.released, task.cancelled, task.completed,
            task.assigned, task.assignment-prepared, task.assignment-activated, task.assignment-aborted,
            task.execution-guard.activated, task.execution-guard.released,
            task.execution.manual-intervention-required,
            contact.attempt.recorded, appointment.proposed, appointment.confirmed,
            appointment.rescheduled, appointment.cancelled, appointment.no-show-marked,
            visit.checked-in, visit.checked-out, visit.interrupted,
            sla.started, sla.breached, sla.met,
            form.submitted, evidence.set-snapshotted,
            evidence.review-case-created, evidence.client-review-case-created,
            evidence.review-decided, evidence.review-case-reopened,
            evidence.correction-case-created, evidence.correction-resubmitted,
            evidence.correction-closed, evidence.correction-waived,
            evidence.condition-disposition-recorded,
            evidence.external-review-receipt-recorded,
            integration.outbound-delivery-created,
            integration.outbound-delivery-acknowledged,
            integration.outbound-delivery-recovered,
            integration.outbound-delivery-replay-requested,
            operational.exception.acknowledged,
            operational.exception.resolved,
            service.assignment.pending-activation,
            service.assignment.task-prepared,
            service.assignment.activated,
            service.assignment.activation-aborted,
            service.assignment.activation-completed,
            service.assignment.activation-abort-completed,
            service.assignment.activation-timed-out]
        schemaVersion: { type: integer, minimum: 1, maximum: 2 }
        occurredAt: { type: string, format: date-time }
        receivedAt: { type: string, format: date-time }
        actorId: { type: [string, 'null'], minLength: 1, maxLength: 128 }
        resourceType: { x-extensible-enum: [WorkOrder, Workflow, Stage, Task, Appointment, Visit, ContactAttempt, SlaInstance, FormSubmission, EvidenceSetSnapshot, ReviewCase, CorrectionCase, OutboundDelivery, OperationalException, ServiceAssignment, ExternalReviewReceipt, EvidenceConditionDisposition] }
        resourceId: { type: string, format: uuid }
        resourceVersion: { type: integer, format: int64, minimum: 1 }
        resourceCode: { type: [string, 'null'], minLength: 1, maxLength: 160 }
        outcomeCode: { type: [string, 'null'], minLength: 1, maxLength: 100 }
        correlationId: { type: string, minLength: 1, maxLength: 128 }
        displayTemplateCode: { type: string, pattern: '^[A-Z][A-Z0-9_]{1,119}$' }
        displayTemplateVersion: { type: integer, minimum: 1 }
    WorkOrderTimelinePage:
      type: object
      additionalProperties: false
      required: [resourceVersion, items, nextCursor, asOf, lastProjectedAt, freshnessStatus]
      properties:
        resourceVersion: { type: integer, format: int64, minimum: 1 }
        items:
          type: array
          maxItems: 100
          items: { $ref: '#/components/schemas/WorkOrderTimelineItem' }
        nextCursor: { type: [string, 'null'] }
        asOf: { type: string, format: date-time }
        lastProjectedAt: { type: [string, 'null'], format: date-time }
        freshnessStatus: { enum: [FRESH, LAGGING, UNKNOWN, REBUILDING] }
    WorkOrderWorkspaceTaskSummary:
      type: object
      additionalProperties: false
      required: [taskId, taskType, taskKind, status, stageCode, claimedBy, version]
      properties:
        taskId: { type: string, format: uuid }
        taskType: { type: string, minLength: 1, maxLength: 100 }
        taskKind: { enum: [HUMAN, AUTOMATED] }
        status: { type: string, minLength: 1, maxLength: 40 }
        stageCode: { type: [string, 'null'], minLength: 1, maxLength: 100 }
        claimedBy: { type: [string, 'null'], minLength: 1, maxLength: 128 }
        version: { type: integer, format: int64, minimum: 1 }
    WorkOrderWorkspaceSlaSummary:
      type: object
      additionalProperties: false
      required: [openCount, breachedCount]
      properties:
        openCount: { type: integer, minimum: 0 }
        breachedCount: { type: integer, minimum: 0 }
    WorkOrderWorkspaceExceptionSummary:
      type: object
      additionalProperties: false
      required: [openCount]
      properties:
        openCount: { type: integer, minimum: 0 }
    WorkOrderWorkspaceSourceVersions:
      type: object
      additionalProperties: false
      required: [workOrderVersion]
      properties:
        workOrderVersion: { type: integer, format: int64, minimum: 1 }
    WorkOrderWorkspaceMeta:
      type: object
      additionalProperties: false
      required: [asOf, projectionCheckpoint, freshnessStatus, queryId]
      properties:
        asOf: { type: string, format: date-time }
        projectionCheckpoint: { type: string, minLength: 1, maxLength: 160 }
        freshnessStatus: { enum: [FRESH, LAGGING, UNKNOWN, REBUILDING] }
        queryId: { type: string, minLength: 1, maxLength: 64 }
    WorkOrderWorkspace:
      type: object
      additionalProperties: false
      required: [header, currentTaskSummary, sectionAvailability, allowedActionLink,
        slaSummary, exceptionSummary, timelineFreshnessStatus, sourceVersions, meta]
      properties:
        header: { $ref: '#/components/schemas/WorkOrder' }
        currentTaskSummary:
          oneOf:
            - { $ref: '#/components/schemas/WorkOrderWorkspaceTaskSummary' }
            - { type: 'null' }
        sectionAvailability:
          type: object
          additionalProperties: { enum: [AVAILABLE, EMPTY, UNAVAILABLE] }
          minProperties: 1
        allowedActionLink: { type: [string, 'null'], minLength: 1, maxLength: 200 }
        slaSummary:
          oneOf:
            - { $ref: '#/components/schemas/WorkOrderWorkspaceSlaSummary' }
            - { type: 'null' }
        exceptionSummary:
          oneOf:
            - { $ref: '#/components/schemas/WorkOrderWorkspaceExceptionSummary' }
            - { type: 'null' }
        timelineFreshnessStatus: { enum: [FRESH, LAGGING, UNKNOWN, REBUILDING] }
        sourceVersions: { $ref: '#/components/schemas/WorkOrderWorkspaceSourceVersions' }
        meta: { $ref: '#/components/schemas/WorkOrderWorkspaceMeta' }
    WorkOrderWorkspaceTasksSectionData:
      type: object
      additionalProperties: false
      required: [items, nextCursor]
      properties:
        items:
          type: array
          maxItems: 100
          items: { $ref: '#/components/schemas/WorkOrderWorkspaceTaskSummary' }
        nextCursor: { type: [string, 'null'] }
    WorkOrderWorkspaceTimelineSectionData:
      type: object
      additionalProperties: false
      required: [items, nextCursor, lastProjectedAt, freshnessStatus]
      properties:
        items:
          type: array
          maxItems: 100
          items: { $ref: '#/components/schemas/WorkOrderTimelineItem' }
        nextCursor: { type: [string, 'null'] }
        lastProjectedAt: { type: [string, 'null'], format: date-time }
        freshnessStatus: { enum: [FRESH, LAGGING, UNKNOWN, REBUILDING] }
    WorkOrderWorkspaceSection:
      type: object
      additionalProperties: false
      required: [section, sourceVersions, meta, tasks, timeline]
      properties:
        section: { enum: [TASKS, TIMELINE_AUDIT] }
        sourceVersions: { $ref: '#/components/schemas/WorkOrderWorkspaceSourceVersions' }
        meta: { $ref: '#/components/schemas/WorkOrderWorkspaceMeta' }
        tasks:
          oneOf:
            - { $ref: '#/components/schemas/WorkOrderWorkspaceTasksSectionData' }
            - { type: 'null' }
        timeline:
          oneOf:
            - { $ref: '#/components/schemas/WorkOrderWorkspaceTimelineSectionData' }
            - { type: 'null' }
    WorkflowInstance:
      type: object
      additionalProperties: false
      required: [id, projectId, workOrderId, configurationBundleId, workflowDefinitionVersionId,
        workflowKey, workflowVersion, definitionDigest, status, version, startedAt]
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        workOrderId: { type: string, format: uuid }
        configurationBundleId: { type: string, format: uuid }
        workflowDefinitionVersionId: { type: string, format: uuid }
        workflowKey: { type: string }
        workflowVersion: { type: string }
