  /tasks/{taskId}/evidence-slots/{slotId}:resolve-condition-change:
    post:
      operationId: resolveEvidenceConditionChange
      summary: 处置条件变化后的已提交资料
      description: >-
        要求 HIGH 风险 evidence.condition-disposition capability。expectedResolutionId 必须精确指向
        产生 REVIEW_REQUIRED 的解析代次；后续表单代次不会清除该未决事实。KEEP 保留历史，INVALIDATE
        复用 EvidenceRevision 与 StoredFile 作废链路。任何未完成校验或并发代次变化均返回 409。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EvidenceConditionDispositionRequest' }
      responses:
        '200':
          description: 处置成功或幂等重放成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceConditionDisposition' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
