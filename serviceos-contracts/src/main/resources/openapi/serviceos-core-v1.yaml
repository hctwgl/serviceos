      responses:
        '200': { $ref: '#/components/responses/AppointmentCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /work-orders/{workOrderId}/visits:
    get:
      operationId: listWorkOrderVisits
      summary: 查询工单的完整上门历史
      description: 按签到采集时间排序；每次实际上门均为独立 Visit，不覆盖历史事实。
      parameters:
        - $ref: '#/components/parameters/WorkOrderId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 当前租户和授权范围内的 Visit 历史
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Visit' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /appointments/{appointmentId}/visits:check-in:
    post:
      operationId: checkInVisit
      summary: 当前责任技师按有效预约签到
      description: Idempotency-Key 必须等于 deviceCommandId；服务器同时保存 capturedAt 和 receivedAt。
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckInVisitRequest' }
      responses:
        '201':
          description: Visit 已创建或返回首次幂等冻结响应
          headers:
            Location: { required: true, schema: { type: string } }
            ETag: { required: true, schema: { type: string } }
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VisitCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /visits/{visitId}:check-out:
    post:
      operationId: checkOutVisit
      summary: 当前责任技师完成现场作业并签退
      parameters:
        - $ref: '#/components/parameters/VisitId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckOutVisitRequest' }
      responses:
        '200': { $ref: '#/components/responses/VisitCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /visits/{visitId}:interrupt:
    post:
      operationId: interruptVisit
      summary: 以受控异常码中断现场作业
      parameters:
        - $ref: '#/components/parameters/VisitId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InterruptVisitRequest' }
      responses:
        '200': { $ref: '#/components/responses/VisitCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /inbound-envelopes/{envelopeId}:
    get:
      operationId: getInboundEnvelope
      summary: 查询入站消息安全摘要
      description: 需要 integration.readInbound 与实时 tenant/project scope；不返回原文对象引用、签名或传输凭据。
      parameters:
        - name: envelopeId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 入站消息摘要
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InboundEnvelope' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
  /internal/integration/byd/review-routes:
    post:
      operationId: registerBydExternalReviewRoute
      summary: 登记 BYD 订单到 CLIENT ReviewCase 的权威回调路由
      description: >-
        仅允许获权 SERVICE principal 调用。请求中的提交引用、回调批次和映射版本必须与
        OPEN CLIENT ReviewCase 冻结事实完全一致；不得从订单号猜测 ReviewCase。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterExternalReviewRouteRequest' }
      responses:
        '201':
          description: 路由登记成功或幂等重放成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExternalReviewRoute' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /canonical-messages/{messageId}:
    get:
      operationId: getCanonicalMessage
      summary: 查询标准消息与领域命令结果摘要
      description: 需要 integration.readInbound 与实时 project scope；不返回包含个人信息的标准消息正文。
      parameters:
        - name: messageId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 标准消息摘要
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CanonicalMessage' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 由受信 OIDC 提供方签发，必须包含 subject、tenant_id；token 中的能力声明不能替代 ServiceOS RoleGrant。
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OperationalExceptionId:
      name: exceptionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AppointmentId:
      name: appointmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WorkOrderId:
      name: workOrderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VisitId:
      name: visitId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 160
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 双引号包裹的正整数聚合版本，例如 `"3"`。
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
  schemas:
    InboundEnvelope:
      type: object
      additionalProperties: false
      required: [inboundEnvelopeId, projectId, connectorVersionId, messageType,
                 externalMessageId, rawPayloadDigest, canonicalPayloadDigest,
                 signatureStatus, processingStatus, mappingVersionId, canonicalMessageId,
                 resultCode, resultType, resultId, receivedAt, completedAt, correlationId]
      properties:
        inboundEnvelopeId: { type: string, format: uuid }
        projectId: { type: [string, 'null'], format: uuid }
        connectorVersionId: { type: string, minLength: 1, maxLength: 120 }
        messageType: { enum: [CREATE_WORK_ORDER, RECORD_CLIENT_REVIEW_RESULT] }
        externalMessageId: { type: string, minLength: 1, maxLength: 160 }
        rawPayloadDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        canonicalPayloadDigest: { type: [string, 'null'], pattern: '^[0-9a-f]{64}$' }
        signatureStatus: { enum: [VALID] }
        processingStatus: { enum: [RECEIVED, COMPLETED, REJECTED] }
        mappingVersionId: { type: [string, 'null'], maxLength: 120 }
        canonicalMessageId: { type: [string, 'null'], format: uuid }
        resultCode: { type: [string, 'null'], maxLength: 80 }
        resultType: { type: [string, 'null'], maxLength: 80 }
        resultId: { type: [string, 'null'], maxLength: 160 }
        receivedAt: { type: string, format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
        correlationId: { type: string, minLength: 1, maxLength: 128 }
    CanonicalMessage:
      type: object
      additionalProperties: false
      required: [canonicalMessageId, projectId, connectorVersionId, messageType,
                 businessKey, payloadDigest, mappingVersionId, processingStatus,
                 resultCode, resultType, resultId, createdAt, processedAt]
      properties:
        canonicalMessageId: { type: string, format: uuid }
        projectId: { type: [string, 'null'], format: uuid }
        connectorVersionId: { type: string, minLength: 1, maxLength: 120 }
        messageType: { enum: [CREATE_WORK_ORDER, RECORD_CLIENT_REVIEW_RESULT] }
        businessKey: { type: string, minLength: 1, maxLength: 200 }
        payloadDigest: { type: string, pattern: '^[0-9a-f]{64}$' }
        mappingVersionId: { type: string, minLength: 1, maxLength: 120 }
        processingStatus: { enum: [PROCESSING, COMPLETED] }
        resultCode: { type: [string, 'null'], maxLength: 80 }
        resultType: { type: [string, 'null'], maxLength: 80 }
        resultId: { type: [string, 'null'], maxLength: 160 }
        createdAt: { type: string, format: date-time }
        processedAt: { type: [string, 'null'], format: date-time }
    RegisterExternalReviewRouteRequest:
      type: object
      additionalProperties: false
      required: [externalOrderCode, reviewCaseId, externalSubmissionRef, callbackBatchRef, mappingVersionId]
      properties:
        externalOrderCode: { type: string, minLength: 1, maxLength: 50 }
        reviewCaseId: { type: string, format: uuid }
        externalSubmissionRef: { type: string, minLength: 1, maxLength: 160 }
        callbackBatchRef: { type: string, minLength: 1, maxLength: 160 }
        mappingVersionId: { type: string, minLength: 1, maxLength: 120 }
    ExternalReviewRoute:
      type: object
      additionalProperties: false
      required: [reviewRouteId, projectId, connectorVersionId, externalOrderCode, reviewCaseId,
                 externalSubmissionRef, callbackBatchRef, mappingVersionId, status,
                 canonicalMessageId, createdBy, createdAt, completedAt]
      properties:
        reviewRouteId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        connectorVersionId: { type: string, const: byd-cpim-v7.3.1 }
        externalOrderCode: { type: string, minLength: 1, maxLength: 50 }
        reviewCaseId: { type: string, format: uuid }
        externalSubmissionRef: { type: string, minLength: 1, maxLength: 160 }
        callbackBatchRef: { type: string, minLength: 1, maxLength: 160 }
        mappingVersionId: { type: string, minLength: 1, maxLength: 120 }
        status: { enum: [ACTIVE, COMPLETED] }
        canonicalMessageId: { type: [string, 'null'], format: uuid }
        createdBy: { type: string, minLength: 1, maxLength: 128 }
        createdAt: { type: string, format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [code, clientId, name, startsOn]
      properties:
        code:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$'
          maxLength: 64
        clientId:
          type: string
          minLength: 1
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 200
        startsOn:
          type: string
          format: date
        endsOn:
          type: [string, 'null']
          format: date
    Project:
      type: object
      additionalProperties: false
      required: [id, tenantId, code, clientId, name, startsOn, status, version, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string }
        code: { type: string }
        clientId: { type: string }
        name: { type: string }
        startsOn: { type: string, format: date }
        endsOn: { type: [string, 'null'], format: date }
        status:
          type: string
          enum: [DRAFT, ACTIVE, SUSPENDED, CLOSED]
        version: { type: integer, format: int64, minimum: 1 }
        createdAt: { type: string, format: date-time }
    CompleteHumanTaskRequest:
      type: object
      additionalProperties: false
      required: [resultRef, resultDigest]
      properties:
        resultRef:
          type: string
          minLength: 1
          maxLength: 500
          description: >-
            表单或双引用 Task 使用 form-submission://{submissionId}；
            无 formRef 的资料 Task 使用 evidence-set-snapshot://{snapshotId}；
            其他非表单/资料 Task 使用所属领域稳定引用
        resultDigest:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: >-
            表单或双引用 Task 必须等于 FormSubmission contentDigest；
            资料-only Task 必须等于 EvidenceSetSnapshot contentDigest
        inputVersionRefs:
          type: array
          maxItems: 8
          description: 双引用 Task 必填；表单-only / 资料-only 必须省略或为空
          items:
            $ref: '#/components/schemas/InputVersionRef'
    InputVersionRef:
      type: object
      additionalProperties: false
      required: [kind, ref, digest]
      properties:
        kind: { enum: [FORM_SUBMISSION, EVIDENCE_SET_SNAPSHOT] }
        ref: { type: string, minLength: 1, maxLength: 500 }
        digest: { type: string, pattern: '^[0-9a-f]{64}$' }
    AssignTaskCandidatesRequest:
      type: object
      additionalProperties: false
      required: [candidatePrincipalIds, sourceType, sourceId]
      properties:
        candidatePrincipalIds:
          type: array
          minItems: 1
          maxItems: 100
          items: { type: string, minLength: 1, maxLength: 128 }
        sourceType: { enum: [ASSIGNEE_POLICY, MANUAL] }
        sourceId: { type: string, minLength: 1, maxLength: 160 }
    ReleaseHumanTaskRequest:
      type: object
      additionalProperties: false
      required: [reasonCode]
      properties:
        reasonCode: { type: string, pattern: '^[A-Z][A-Z0-9_]{1,99}$' }
    TaskAssignmentBatchReceipt:
      type: object
      additionalProperties: false
      required: [assignmentBatchId, taskId, candidateCount, taskVersion, assignedAt]
      properties:
        assignmentBatchId: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        candidateCount: { type: integer, minimum: 1, maximum: 100 }
        taskVersion: { type: integer, format: int64, minimum: 2 }
        assignedAt: { type: string, format: date-time }
    HumanTaskCommandReceipt:
      type: object
      additionalProperties: false
      required: [taskId, status, actorId, version, occurredAt]
      properties:
        taskId: { type: string, format: uuid }
        status: { enum: [CLAIMED, RUNNING, COMPLETED] }
        actorId: { type: string, minLength: 1, maxLength: 128 }
        version: { type: integer, format: int64, minimum: 2 }
        occurredAt: { type: string, format: date-time }
    ReleasedHumanTaskReceipt:
      type: object
      additionalProperties: false
      required: [taskId, status, actorId, version, occurredAt]
      properties:
        taskId: { type: string, format: uuid }
        status: { const: READY }
        actorId: { type: string, minLength: 1, maxLength: 128 }
        version: { type: integer, format: int64, minimum: 2 }
        occurredAt: { type: string, format: date-time }
    BeginUploadRequest:
      type: object
      additionalProperties: false
      required:
        [businessContextType, businessContextId, originalFileName, declaredMimeType, expectedSize, expectedSha256]
      properties:
        businessContextType:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9_.-]*$'
          maxLength: 80
        businessContextId: { type: string, minLength: 1, maxLength: 160 }
        originalFileName: { type: string, minLength: 1, maxLength: 255 }
        declaredMimeType: { type: string, minLength: 3, maxLength: 255 }
        expectedSize: { type: integer, format: int64, minimum: 1 }
        expectedSha256: { type: string, pattern: '^[0-9A-Fa-f]{64}$' }
    FinalizeUploadRequest:
      type: object
      additionalProperties: false
      required: [actualSha256, finalizeCommandId]
      properties:
        actualSha256: { type: string, pattern: '^[0-9A-Fa-f]{64}$' }
        finalizeCommandId: { type: string, minLength: 1, maxLength: 160 }
    AuthorizeDownloadRequest:
      type: object
      additionalProperties: false
      required: [purpose]
      properties:
        purpose: { type: string, minLength: 1, maxLength: 500 }
    UploadSession:
      type: object
      additionalProperties: false
      required:
        [uploadSessionId, fileId, status, uploadMethod, uploadUrl, requiredHeaders,
         uploadAuthorizationExpiresAt, sessionExpiresAt]
      properties:
        uploadSessionId: { type: string, format: uuid }
        fileId: { type: string, format: uuid }
        status:
          enum: [CREATED, UPLOADING, FINALIZING, COMPLETED, EXPIRED, FAILED]
        uploadMethod: { type: [string, 'null'], enum: [PUT, null] }
        uploadUrl: { type: [string, 'null'], format: uri }
        requiredHeaders:
          type: object
          additionalProperties: { type: string }
        uploadAuthorizationExpiresAt: { type: [string, 'null'], format: date-time }
        sessionExpiresAt: { type: string, format: date-time }
    InvalidateStoredFileRequest:
      type: object
      additionalProperties: false
      required: [reasonCode, sourceType, sourceId]
      properties:
        reasonCode: { type: string, minLength: 1, maxLength: 80 }
        sourceType: { type: string, minLength: 1, maxLength: 80 }
        sourceId: { type: string, minLength: 1, maxLength: 128 }

    StoredFile:
      type: object
      additionalProperties: false
      required:
        [fileId, tenantId, originalFileName, checksumSha256, size, declaredMimeType,
         detectedMimeType, lifecycleStatus, quarantineReason, createdAt, version]
      properties:
        fileId: { type: string, format: uuid }
        tenantId: { type: string, minLength: 1, maxLength: 64 }
        originalFileName: { type: string, minLength: 1, maxLength: 255 }
        checksumSha256: { type: string, pattern: '^[0-9a-f]{64}$' }
        size: { type: integer, format: int64, minimum: 1 }
        declaredMimeType: { type: string }
        detectedMimeType: { type: string }
        lifecycleStatus: { enum: [QUARANTINED, AVAILABLE, INVALIDATED] }
        quarantineReason: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        version: { type: integer, format: int64, minimum: 1 }
    DownloadAuthorization:
      type: object
      additionalProperties: false
      required: [authorizationId, fileId, method, downloadUrl, requiredHeaders, expiresAt]
      properties:
        authorizationId: { type: string, format: uuid }
        fileId: { type: string, format: uuid }
        method: { type: string, const: GET }
        downloadUrl: { type: string, format: uri }
        requiredHeaders:
          type: object
          additionalProperties: { type: string }
        expiresAt: { type: string, format: date-time }
    OperationalExceptionPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OperationalException' }
        nextCursor: { type: [string, 'null'] }
    OperationalException:
      type: object
      additionalProperties: false
      required: [exceptionId, sourceType, sourceId, sourceAttemptId, sourceTaskType, category,
                 severity, errorCode, status, occurrenceCount, aggregateVersion, openedAt,
                 lastDetectedAt, allowedActions]
      properties:
        exceptionId: { type: string, format: uuid }
        sourceType: { type: string }
        sourceId: { type: string }
        sourceAttemptId: { type: string, format: uuid }
        sourceTaskType: { type: string }
        category: { type: string }
        severity: { enum: [P0, P1, P2, P3] }
        errorCode: { type: string }
        status: { enum: [OPEN, ACKNOWLEDGED, RESOLVED] }
        workOrderId: { type: [string, 'null'], format: uuid }
        taskId: { type: [string, 'null'], format: uuid }
        handlingTaskId: { type: [string, 'null'], format: uuid }
        occurrenceCount: { type: integer, format: int64, minimum: 1 }
        aggregateVersion: { type: integer, format: int64, minimum: 1 }
        openedAt: { type: string, format: date-time }
        lastDetectedAt: { type: string, format: date-time }
        acknowledgedAt: { type: [string, 'null'], format: date-time }
        acknowledgedBy: { type: [string, 'null'] }
        acknowledgementNote: { type: [string, 'null'] }
        resolvedAt: { type: [string, 'null'], format: date-time }
        resolutionCode: { type: [string, 'null'] }
        allowedActions:
          type: array
          items: { enum: [ACKNOWLEDGE] }
    AcknowledgeOperationalExceptionRequest:
      type: object
      additionalProperties: false
      properties:
        note: { type: [string, 'null'], maxLength: 500 }
    OperationalExceptionAcknowledgement:
      type: object
      additionalProperties: false
      required: [exceptionId, status, aggregateVersion, acknowledgedAt, acknowledgedBy]
      properties:
        exceptionId: { type: string, format: uuid }
        status: { const: ACKNOWLEDGED }
        aggregateVersion: { type: integer, format: int64, minimum: 2 }
        acknowledgedAt: { type: string, format: date-time }
        acknowledgedBy: { type: string, minLength: 1, maxLength: 128 }
    AppointmentWindow:
      type: object
      additionalProperties: false
      required: [start, end, timezone, estimatedDurationMinutes]
      properties:
        start: { type: string, format: date-time }
        end: { type: string, format: date-time }
        timezone: { type: string, minLength: 1, maxLength: 80 }
        estimatedDurationMinutes: { type: integer, minimum: 1, maximum: 1440 }
    ProposeAppointmentRequest:
      type: object
      additionalProperties: false
      required: [type, window, addressRef, addressVersion]
      properties:
        type: { enum: [SURVEY, INSTALLATION, REPAIR, CORRECTION, SECOND_VISIT] }
        window: { $ref: '#/components/schemas/AppointmentWindow' }
        addressRef: { type: string, minLength: 1, maxLength: 200 }
        addressVersion: { type: string, minLength: 1, maxLength: 100 }
    ConfirmAppointmentRequest:
      type: object
      additionalProperties: false
      required: [confirmedPartyType, confirmedPartyRef, confirmationChannel]
      properties:
        confirmedPartyType: { type: string, minLength: 1, maxLength: 80 }
        confirmedPartyRef: { type: string, minLength: 1, maxLength: 200 }
        confirmationChannel: { type: string, minLength: 1, maxLength: 80 }
    RescheduleAppointmentRequest:
      type: object
      additionalProperties: false
      required: [newWindow, reasonCode]
      properties:
        newWindow: { $ref: '#/components/schemas/AppointmentWindow' }
        reasonCode: { type: string, minLength: 1, maxLength: 100 }
        note: { type: [string, 'null'], maxLength: 500 }
    RecordContactAttemptRequest:
      type: object
      additionalProperties: false
      required: [channel, contactedPartyRef, startedAt, endedAt, resultCode]
      properties:
        channel: { type: string, minLength: 1, maxLength: 80 }
        contactedPartyRef: { type: string, minLength: 1, maxLength: 200 }
        startedAt: { type: string, format: date-time }
