          content: { application/json: { schema: { $ref: '#/components/schemas/Delegation' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /authorization:explain:
    post:
      operationId: explainAuthorization
      summary: 解释一次假设授权判定
      description: 需要 authorization.explain；返回脱敏匹配摘要并写审计，不执行业务动作。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ExplainAuthorizationRequest' } } }
      responses:
        '200':
          description: 授权解释
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/AuthorizationExplainResult' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /me:
    get:
      operationId: getMe
      summary: 当前主体摘要与 Persona
      description: |
        返回当前 JWT 映射的 Principal、有效 Persona 与 contextVersion。
        Schema 预留 CONSUMER Persona，但不宣称 C 端身份已交付，也不返回 Consumer Portal 入口。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 当前主体
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/MeProfile' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /me/contexts:
    get:
      operationId: listMeContexts
      summary: 当前主体可用 Portal 上下文
      description: |
        仅由有效 Persona、Membership、RoleGrant 计算 ADMIN/NETWORK/TECHNICIAN 上下文。
        请求中的 projectId/networkId/contextId 只能选择本接口已返回项，不能创建授权。
        CONSUMER Persona 不产生上下文。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 可用上下文
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/MeContexts' } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /me/capabilities:
    get:
      operationId: listMeCapabilities
      summary: 当前上下文有效 Capability 集合
      description: |
        导航/体验辅助查询。业务 API 仍须按资源重新鉴权；旧 contextVersion 失败关闭。
      parameters:
        - name: contextId
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
        - name: expectedContextVersion
          in: query
          required: false
          schema: { type: string, minLength: 1, maxLength: 120 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 上下文能力集合
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/MeCapabilities' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /me/navigation:
    get:
      operationId: listMeNavigation
      summary: 当前上下文可见导航
      description: |
        由代码注册 Page Registry、Capability、feature gate 与 context 计算稳定 pageId。
        导航隐藏不是授权事实；直接访问隐藏 URL 或伪造 allowed action 仍由后端重新鉴权。
      parameters:
        - name: contextId
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
        - name: expectedContextVersion
          in: query
          required: false
          schema: { type: string, minLength: 1, maxLength: 120 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 导航项
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/MeNavigation' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /search:
    get:
      operationId: searchResources
      summary: Admin 受控全局搜索
      description: |
        M192：Portal=ADMIN。需要 search.read（HIGH）。types 仅接受 WORK_ORDER、EXTERNAL_ORDER、
        NETWORK、TECHNICIAN；未支持 type（含 VEHICLE/CHARGER）返回 SEARCH_TERM_NOT_ALLOWED（422）。
        缺 type 对应读能力时省略该 type（降级），不整请求 403。经既有授权查询 fan-in，不授予额外能力。
        响应不回显完整敏感 q，仅提供 qDigest；手机号形态仅允许末四位。
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
        - name: types
          in: query
          required: false
          description: 逗号分隔；缺省为全部本切片接受类型
          schema: { type: string, maxLength: 200 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 受控搜索结果
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/ControlledSearchResult' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /me/saved-views:
    get:
      operationId: listMySavedViews
      summary: 列出当前主体在指定 pageId 下可见的 SavedView
      description: |
        M189/M191：返回本人 PRIVATE 视图，以及同租户 TENANT 共享与持有 RoleGrant 的 ROLE 共享视图。
        列出/应用视图不授予页面 capability；业务查询仍重新鉴权。
        支持 pageId：ADMIN.TASK.QUEUE、ADMIN.WORKORDER.LIST、ADMIN.CORRECTION.QUEUE。
      parameters:
        - name: pageId
          in: query
          required: true
          schema:
            type: string
            enum: [ADMIN.TASK.QUEUE, ADMIN.WORKORDER.LIST, ADMIN.CORRECTION.QUEUE]
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 个人与可见共享 SavedView 列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SavedViewPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      operationId: createMySavedView
      summary: 创建个人 SavedView
      description: |
        任意已认证主体可创建自己的视图。filter AST 仅允许页面 Accepted OpenAPI query 字段/EQ。
        未知字段返回 QUERY_FILTER_NOT_ALLOWED；schema 不兼容返回 SAVED_VIEW_SCHEMA_OUTDATED。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSavedViewRequest' }
      responses:
        '200':
          description: 已创建视图
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
            ETag: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SavedView' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /me/saved-views/{savedViewId}:
    put:
      operationId: updateMySavedView
      summary: 更新本人 SavedView
      description: |
        仅 owner 可更新；跨主体返回 404。目录不兼容返回 SAVED_VIEW_SCHEMA_OUTDATED。
      parameters:
        - name: savedViewId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: If-Match
          in: header
          required: true
          schema: { type: string, minLength: 1 }
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSavedViewRequest' }
      responses:
        '200':
          description: 已更新视图
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
            ETag: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SavedView' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
    delete:
      operationId: deleteMySavedView
      summary: 删除本人 SavedView
      parameters:
        - name: savedViewId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '204':
          description: 已删除
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /saved-views/{savedViewId}:share:
    post:
      operationId: shareSavedView
      summary: 设置 Admin SavedView 可见性（共享或收回）
      description: |
        M191：仅 owner 可操作。visibility=ROLE/TENANT 需要 preference.shareSavedView（HIGH）；
        visibility=PRIVATE 收回共享，owner 始终允许。共享只共享查询定义，不授予数据访问权。
        ROLE 时 sharedScopeRef 为同租户 roleId；TENANT/PRIVATE 时 sharedScopeRef 必须为空。
      parameters:
        - name: savedViewId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: If-Match
          in: header
          required: true
          schema: { type: string, minLength: 1 }
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShareSavedViewRequest' }
      responses:
        '200':
          description: 已更新可见性
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
            ETag: { required: true, schema: { type: string } }
          content: { application/json: { schema: { $ref: '#/components/schemas/SavedView' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }

  /me/recent-resources:
    get:
      operationId: listMyRecentResources
      summary: 列出当前主体的 Admin 最近访问资源
      description: |
        M193：仅 Portal=ADMIN。任意已认证主体可读自己的最近访问；不要求新 capability。
        服务端对每项经既有授权查询重新鉴权，失权项省略（不整列表 403）。
        支持类型：WORK_ORDER、TASK、PROJECT、NETWORK、TECHNICIAN。上限默认/最大 20。
      parameters:
        - name: portal
          in: query
          required: false
          schema: { type: string, enum: [ADMIN], default: ADMIN }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 20, default: 20 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 已按当前授权过滤的最近访问列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/RecentResourcePage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    put:
      operationId: touchMyRecentResource
      summary: 记录一次 Admin 资源访问（upsert）
      description: |
        M193：upsert 本人最近访问行并更新 lastVisitedAt。同 (resourceType, resourceId) 覆盖。
        portal 必须为 ADMIN。displayRef 仅为非敏感短标签；不得含完整电话/地址/价格。
        不要求新 capability；超出上限时裁剪最旧行。
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TouchRecentResourceRequest' }
      responses:
        '200':
          description: 已记录的最近访问项
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/RecentResourceItem' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /network-portal/work-orders:
    get:
      operationId: listNetworkPortalWorkOrders
      summary: Network Portal 本网点 ACTIVE 责任工单
      description: |
        M194：需要有效 NETWORK 门户上下文（X-Network-Context）与 NETWORK scope networkTask.read。
        仅返回该网点 ACTIVE NETWORK ServiceAssignment 对应工单；禁止 query-param networkId。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 本网点 ACTIVE 责任工单列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalWorkOrderPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/tasks:
    get:
      operationId: listNetworkPortalTasks
      summary: Network Portal 本网点 ACTIVE 责任任务
      description: |
        M194：X-Network-Context + networkTask.read。数据范围同 work-orders，按任务展开。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 本网点 ACTIVE 责任任务列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalTaskPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/technicians:
    get:
      operationId: listNetworkPortalTechnicians
      summary: Network Portal 本网点师傅列表
      description: |
        M194：X-Network-Context + technician.readOwnNetwork。仅 ACTIVE NetworkTechnicianMembership。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 本网点 ACTIVE 师傅列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalTechnicianPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/capacity:
    get:
      operationId: listNetworkPortalCapacity
      summary: Network Portal 本网点容量计数
      description: |
        M194：X-Network-Context + networkTask.read。读取 dsp_capacity_counter（NETWORK assignee）。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 本网点容量计数列表
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalCapacityPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/workbench:
    get:
      operationId: getNetworkPortalWorkbench
      summary: Network Portal 工作台计数摘要
      description: |
        M194：X-Network-Context + networkTask.read。返回 ACTIVE 工单/任务/师傅计数与容量摘要。
      parameters:
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 工作台摘要
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/NetworkPortalWorkbenchView' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
  /network-portal/tasks/{taskId}:assign-technician:
    post:
      operationId: assignNetworkPortalTechnician
      summary: Network Portal 为本网点任务指派师傅
      description: |
        M196：X-Network-Context + NETWORK scope networkPortal.assignTechnician。
        请求体不含 networkAssigneeId；服务端强制等于可信上下文网点 UUID 字符串。
        委托已 Implemented 的 ManualAssign 激活 saga；不支持改派/评分/硬过滤。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）；
        已有不同师傅 ACTIVE TECHNICIAN 返回 SERVICE_ASSIGNMENT_CONFLICT（409）。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NetworkPortalAssignTechnicianRequest' }
      responses:
        '200':
          description: 双责任已激活或幂等回放
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManualServiceAssignmentReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
