          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CorrectionCase' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /network-portal/correction-cases/{correctionCaseId}/evidence-set-snapshots:
    post:
      operationId: createNetworkPortalCorrectionEvidenceSetSnapshot
      summary: Network Portal 整改代补创建资料快照
      description: |
        M201 扩展：X-Network-Context + NETWORK scope evidence.submitOnBehalf 门禁后，
        冻结整改源 Task 当前可提交资料集合并创建 EvidenceSetSnapshot；不要求师傅 correction Task 认领。
        上下文缺失/伪造/非成员返回 PORTAL_CONTEXT_INVALID（403）。
        M368 / ADR-089：要求 NETWORK_WEB 客户端能力门禁；不兼容返回 422 CLIENT_CAPABILITY_UNSUPPORTED。
      parameters:
        - name: correctionCaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/NetworkContext'
        - $ref: '#/components/parameters/ClientKind'
        - $ref: '#/components/parameters/ClientVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberRevisionIds]
              properties:
                memberRevisionIds:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '201':
          description: 资料快照已创建
          headers:
            X-Correlation-Id: { required: true, schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceSetSnapshot' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /technician/me/task-feed:
    get:
      operationId: listTechnicianTaskFeed
      summary: Technician Portal 当前师傅任务 Feed
      description: |
        M195：需要有效 TECHNICIAN 门户上下文（X-Technician-Context）与 NETWORK scope task.readAssigned。
        返回当前师傅 ACTIVE TECHNICIAN ServiceAssignment / TaskAssignment；可选 sinceCursor 增量，
        含撤权/结束 tombstone（仅 taskId + invalidationReason）。禁止离线工作包 runtime。
        上下文缺失/伪造/非师傅成员返回 PORTAL_CONTEXT_INVALID（403）。
        M359：ASSIGNMENT 项可含 `clientCapabilityUnsupportedDetail`；当前 clientKind 无法履约冻结
        FORM/EVIDENCE 时给出中文说明，客户端应展示并阻止进入详情执行（不静默忽略）。
      parameters:
        - $ref: '#/components/parameters/TechnicianContext'
        - name: sinceCursor
          in: query
          required: false
          description: 不透明增量游标；缺省返回 ACTIVE 快照
          schema: { type: string, minLength: 1, maxLength: 256 }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 任务 Feed
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/TechnicianPortalFeedPage' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /technician/me/tasks/{taskId}:
    get:
      operationId: getTechnicianTaskDetail
      summary: Technician Portal 当前责任任务在线详情
      description: |
        M243～M246：需要有效 X-Technician-Context 与 NETWORK scope task.readAssigned。
        仅返回当前师傅 ACTIVE ServiceAssignment/TaskAssignment 对应的非 PII 任务头、执行保护状态和
        非敏感预约/联系/Visit 历史摘要；联系摘要不含 contactedPartyRef、note、recordingRef、actorId；
        Visit 摘要不含 GPS、距离、设备、离线命令、note、operation/evidence refs；
        不返回地址、联系人、表单值、资料文件、配置源码或离线工作包。
        其他师傅、其他网点、已撤权或不存在的 taskId 均返回 404，避免资源枚举。
        M359：对已知 TECHNICIAN_WEB/IOS，若冻结 FORM/EVIDENCE 与当前客户端不兼容，
        返回 422 `CLIENT_CAPABILITY_UNSUPPORTED`，禁止进入现场中途执行。
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/TechnicianContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 当前责任任务的非 PII 在线详情
          headers: { X-Correlation-Id: { required: true, schema: { type: string } } }
          content: { application/json: { schema: { $ref: '#/components/schemas/TechnicianPortalTaskDetail' } } }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /technician/me/appointments/{appointmentId}/visits:check-in:
    post:
      operationId: checkInTechnicianVisit
      summary: 当前师傅在已确认预约主动签到
      description: |
        M262：X-Technician-Context 必须是当前主体 ACTIVE 网点关系，预约必须属于同一网点且当前
        ServiceAssignment 仍由该师傅承担。客户端只在用户主动操作时采集位置；服务端固定 offline=false，
        receivedAt、technician 与 network 均来自可信上下文。Idempotency-Key 必须等于 deviceCommandId。
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
        - $ref: '#/components/parameters/TechnicianContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TechnicianCheckInVisitRequest' }
      responses:
        '201': { $ref: '#/components/responses/VisitCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /technician/me/visits/{visitId}:check-out:
    post:
      operationId: checkOutTechnicianVisit
      summary: 当前师傅完成本次上门
      description: M262：上下文与当前责任实时复核；operationRefs 必须引用已完成现场操作，客户端不得填充占位值。
      parameters:
        - $ref: '#/components/parameters/VisitId'
        - $ref: '#/components/parameters/TechnicianContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CheckOutVisitRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/VisitCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /technician/me/visits/{visitId}:interrupt:
    post:
      operationId: interruptTechnicianVisit
      summary: 当前师傅记录无法施工并中断本次上门
      description: M262：上下文与当前责任实时复核；异常码必填，证据引用可为空且不会伪造上传完成。
      parameters:
        - $ref: '#/components/parameters/VisitId'
        - $ref: '#/components/parameters/TechnicianContext'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/InterruptVisitRequest' } } }
      responses:
        '200': { $ref: '#/components/responses/VisitCommandReceipt' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
  /technician/me/tasks/{taskId}/forms:
    get:
      operationId: listTechnicianTaskForms
      summary: 查询当前责任任务锁定的表单版本
      description: |
        M263：先验证 X-Technician-Context、ACTIVE 师傅网点关系、task.readAssigned 和当前责任，
        再按 form.read 解析 Task 冻结 Bundle 中唯一 FormVersion；不回退到最新配置。
        M357：对已知 TECHNICIAN_WEB/TECHNICIAN_IOS，服务端权威校验冻结表单所需客户端能力；
        不兼容时返回 422 `CLIENT_CAPABILITY_UNSUPPORTED`，客户端不得静默忽略。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/TechnicianContext'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: 当前任务锁定表单；无 formRef 时返回空数组
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/TaskForm' } }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /technician/me/tasks/{taskId}/form-submissions:
    post:
      operationId: submitTechnicianTaskForm
      summary: 当前师傅在线提交任务锁定表单
      description: |
