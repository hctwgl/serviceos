        revisionId, projectId, regionCodes, networkIds, addedRegionCodes, removedRegionCodes,
        addedNetworkIds, removedNetworkIds, reason, aggregateVersion, revisedAt
      ]
      properties:
        revisionId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        regionCodes: { $ref: '#/components/schemas/StableProjectScopeReferences' }
        networkIds: { $ref: '#/components/schemas/StableProjectScopeReferences' }
        addedRegionCodes: { $ref: '#/components/schemas/StableProjectScopeReferences' }
        removedRegionCodes: { $ref: '#/components/schemas/StableProjectScopeReferences' }
        addedNetworkIds: { $ref: '#/components/schemas/StableProjectScopeReferences' }
        removedNetworkIds: { $ref: '#/components/schemas/StableProjectScopeReferences' }
        reason: { type: string, minLength: 1, maxLength: 500 }
        aggregateVersion: { type: integer, format: int64, minimum: 2 }
        revisedAt: { type: string, format: date-time }
    ProjectScopeRelationRevisionPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, asOf]
      properties:
        items:
          type: array
