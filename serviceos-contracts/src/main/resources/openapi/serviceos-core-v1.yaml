        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WaiveCorrectionCaseRequest' }
      responses:
        '200':
          description: 已豁免的 CorrectionCase
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CorrectionCase' }
