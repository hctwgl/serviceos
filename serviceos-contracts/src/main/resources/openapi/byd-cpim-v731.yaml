openapi: 3.1.0
info:
  title: ServiceOS BYD CPIM Adapter API
  version: 0.3.0
  description: >-
    BYD CPIM V7.3.1 入站安装订单、提审与厂端审核回调协议契约。端点不使用 ServiceOS OIDC Bearer Token，
    而使用 APP_KEY、Nonce、Cur_Time、Sign 四个协议头完成签名认证与防重放。
servers:
  - url: /api/v1
paths:
  /jumpto/openapi/sp/pushSubmitReviewInfo:
    post:
      operationId: pushSubmitReviewInfo
      summary: 向 BYD CPIM 提交审核资料
      description: >-
        每个 Delivery 的 payload 固化后才能发送。CPIM 协议不提供幂等键或状态查询；
        因此只有明确未送达时才能终止，未知结果必须转人工处理且不得自动重发。
      servers:
        - url: '{bydCpimBaseUrl}'
          variables:
            bydCpimBaseUrl:
              default: https://cpim.example.invalid
              description: 由部署环境显式配置的 BYD CPIM 基础地址
      security: []
      parameters:
        - $ref: '#/components/parameters/AppKey'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/CurrentTime'
        - $ref: '#/components/parameters/Signature'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BydCpimSubmitReviewRequest' }
      responses:
        '200':
          description: CPIM 已明确返回接收或业务拒绝
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BydCpimSubmitReviewResponse' }
  /integrations/byd/cpim/v7.3.1/review-results:
    post:
      operationId: receiveBydCpimReviewResult
      summary: 接收 BYD 厂端审核结果
      description: >-
        orderCode 可包含最多 100 个逗号分隔订单号且总长度不超过 200。只有已显式登记的
        OPEN CLIENT ReviewCase 路由会进入领域裁决；其余订单逐项失败关闭并返回部分成功。
      security: []
      parameters:
        - $ref: '#/components/parameters/AppKey'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/CurrentTime'
        - $ref: '#/components/parameters/Signature'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BydCpimReviewCallbackRequest' }
      responses:
        '200':
          description: 全部成功、部分成功或协议级拒绝
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BydCpimReviewCallbackResponse' }
        '400':
          description: HTTP 请求头或 JSON 无法解析
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /integrations/byd/cpim/v7.3.1/install-orders:
    post:
      operationId: receiveBydCpimInstallOrder
      summary: 接收比亚迪海洋山东试点安装订单
      description: >-
        首期只接受 carBrand=40、provinceCode=370000、provinceName=山东省。
        验签和业务校验通过后，服务端必须唯一解析已发布配置包并创建或重放同一工单。
        协议级或业务级拒绝均返回 HTTP 200，并通过响应中的 success 与 code 表达结果。
      security: []
      parameters:
        - $ref: '#/components/parameters/AppKey'
        - $ref: '#/components/parameters/Nonce'
        - $ref: '#/components/parameters/CurrentTime'
        - $ref: '#/components/parameters/Signature'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BydCpimInstallOrderRequest'
      responses:
        '200':
          description: 请求已接收、幂等重放或被协议/业务规则拒绝
          headers:
            X-Correlation-Id:
              schema:
                type: string
                maxLength: 128
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BydCpimInboundOrderResponse'
        '400':
          description: HTTP 载荷无法被解析，例如无效 JSON 或请求头类型错误
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  parameters:
    AppKey:
      name: APP_KEY
      in: header
      required: true
      description: BYD CPIM 分配给服务商的应用标识
      schema:
        type: string
        minLength: 1
        maxLength: 128
    Nonce:
      name: Nonce
      in: header
      required: true
      description: 单次请求随机串；相同 Nonce、请求时间和载荷允许安全重放
      schema:
        type: string
        minLength: 1
        maxLength: 128
    CurrentTime:
      name: Cur_Time
      in: header
      required: true
      description: CPIM 协议日期，格式 yyyy-MM-dd；必须等于服务端协议时区的当前日期
      schema:
        type: string
        format: date
    Signature:
      name: Sign
      in: header
      required: true
      description: 按 CPIM V7.3.1 规则生成的 SHA-256 十六进制签名
      schema:
        type: string
        pattern: '^[0-9A-Fa-f]{64}$'
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
  schemas:
    BydCpimSubmitReviewRequest:
      type: object
      additionalProperties: false
      required: [operatePerson, orderCode, commitDate]
      properties:
        operatePerson: { type: string, minLength: 1, maxLength: 50 }
        orderCode: { type: string, minLength: 1, maxLength: 50 }
        commitDate:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$'
    BydCpimSubmitReviewResponse:
      type: object
      additionalProperties: false
      required: [errno, errmsg, data]
      properties:
        errno: { type: integer }
        errmsg: { type: string }
        data: { type: 'null' }
    BydCpimInstallOrderRequest:
      type: object
      additionalProperties: false
      required:
        - orderCode
        - contactName
        - contactMobile
        - contactAddress
        - provinceCode
        - provinceName
        - cityCode
        - cityName
        - areaCode
        - areaName
        - wallboxName
        - wallboxPower
        - bringWallbox
        - dispatchTime
        - carOwnerType
        - type
        - carBrand
        - carSeries
        - carModel
        - vin
        - dealerName
        - rightCode
        - orderAmount
        - source
        - channel
      properties:
        orderCode: { type: string, minLength: 1, maxLength: 64 }
        contactName: { type: string, minLength: 1, maxLength: 64 }
        contactMobile: { type: string, minLength: 1, maxLength: 32 }
        contactAddress: { type: string, minLength: 1, maxLength: 512 }
        provinceCode: { type: string, const: '370000' }
        provinceName: { type: string, const: '山东省' }
        cityCode: { type: string, minLength: 1, maxLength: 16 }
        cityName: { type: string, minLength: 1, maxLength: 32 }
        areaCode: { type: string, minLength: 1, maxLength: 16 }
        areaName: { type: string, minLength: 1, maxLength: 32 }
        wallboxName: { type: string, minLength: 1, maxLength: 128 }
        wallboxPower: { type: string, minLength: 1, maxLength: 32 }
        bringWallbox: { type: string, minLength: 1, maxLength: 8 }
        dispatchTime: { type: string, format: date-time }
        carOwnerType: { type: string, minLength: 1, maxLength: 8 }
        type: { type: string, minLength: 1, maxLength: 8 }
        carBrand: { type: string, const: '40' }
        carSeries: { type: string, minLength: 1, maxLength: 64 }
        carModel: { type: string, minLength: 1, maxLength: 128 }
        vin:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
        dealerName: { type: string, minLength: 1, maxLength: 128 }
        rightCode: { type: string, minLength: 1, maxLength: 64 }
        orderAmount: { type: number, minimum: 0 }
        source: { type: string, minLength: 1, maxLength: 8 }
        channel: { type: string, minLength: 1, maxLength: 32 }
    BydCpimReviewCallbackRequest:
      type: object
      additionalProperties: false
      required: [orderCode, result, examinePerson, examineDate]
      properties:
        orderCode:
          type: string
          minLength: 1
          maxLength: 200
          description: 最多 100 个不重复订单号，以英文逗号分隔
        result:
          type: string
          enum: ['1', '2']
          description: 1 审核通过，2 审核不通过
        remark:
          type: string
          maxLength: 200
          description: 审核不通过时必须为非空文本
        examinePerson: { type: string, minLength: 1, maxLength: 50 }
        examineDate:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$'
    BydCpimReviewCallbackResponse:
      type: object
      additionalProperties: false
      required: [message, data]
      properties:
        message:
          type: string
          description: success、partially success 或稳定协议拒绝码
        data:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [orderCode, reason]
            properties:
              orderCode: { type: string }
              reason: { type: string }
    BydCpimInboundOrderResponse:
      type: object
      additionalProperties: false
      required: [success, code, message, replay]
      properties:
        success: { type: boolean }
        code:
          type: string
          enum:
            - ACCEPTED
            - REPLAYED
            - UNKNOWN_APP_KEY
            - TIMESTAMP_OUT_OF_WINDOW
            - SIGNATURE_MISMATCH
            - INVALID_HEADERS
            - INVALID_PAYLOAD
            - INVALID_ORDER
            - REPLAY_CONFLICT
        message: { type: string }
        orderCode: { type: [string, 'null'] }
        adapterVersion: { type: [string, 'null'] }
        mappingVersion: { type: [string, 'null'] }
        replay: { type: boolean }
    Problem:
      type: object
      required: [type, title, status, errorCode]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        errorCode: { type: string }
        correlationId: { type: [string, 'null'] }
