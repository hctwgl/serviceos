spring:
  application:
    name: serviceos-backend
  aop:
    # 事务与 Repository 异常翻译优先代理稳定接口，实现类可以继续保持包内 final。
    # 没有接口但需要事务的协作者必须允许 CGLIB 子类化，并由数据库 IT 真实装配验证。
    proxy-target-class: false
  datasource:
    url: ${SERVICEOS_DB_URL:jdbc:postgresql://localhost:5432/serviceos}
    username: ${SERVICEOS_DB_USERNAME:serviceos_app}
    password: ${SERVICEOS_DB_PASSWORD:serviceos_app}
    hikari:
      maximum-pool-size: ${SERVICEOS_DB_POOL_SIZE:10}
  flyway:
    locations:
      - classpath:db/migration/reliability
      - classpath:db/migration/audit
      - classpath:db/migration/authorization
      - classpath:db/migration/project
      - classpath:db/migration/task
      - classpath:db/migration/operations
      - classpath:db/migration/files
      - classpath:db/migration/integration
      - classpath:db/migration/workorder
    validate-migration-naming: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer + audience 校验 token 归属；同时给出 JWK 地址以避免启动依赖 OIDC discovery。
          issuer-uri: ${SERVICEOS_OIDC_ISSUER_URI:http://localhost:8081/realms/serviceos}
          jwk-set-uri: ${SERVICEOS_OIDC_JWK_SET_URI:http://localhost:8081/realms/serviceos/protocol/openid-connect/certs}
          audiences: ${SERVICEOS_OIDC_AUDIENCE:serviceos-api}
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: ${SERVICEOS_SHUTDOWN_TIMEOUT:30s}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
        add-additional-paths: true
      group:
        # 存活仅判断进程自身，绝不能因数据库或外部依赖故障触发级联重启。
        liveness:
          include: livenessState
        # 就绪包含数据库；不可服务时先摘流量，再由运维处置依赖故障。
        readiness:
          include: readinessState,db
  tracing:
    sampling:
      probability: ${SERVICEOS_TRACE_SAMPLING_PROBABILITY:0.10}
    propagation:
      type: W3C
    baggage:
      remote-fields: serviceos.correlation_id
      correlation:
        fields: serviceos.correlation_id
    export:
      otlp:
        # 本地与测试默认不尝试网络导出；部署环境显式开启并配置 Collector。
        enabled: ${SERVICEOS_OTLP_TRACING_ENABLED:false}
  opentelemetry:
    resource-attributes:
      service.namespace: serviceos
      deployment.environment.name: ${SERVICEOS_ENVIRONMENT:local}
    tracing:
      export:
        otlp:
          endpoint: ${SERVICEOS_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  otlp:
    metrics:
      export:
        # OTel starter 同时提供 OTLP metrics registry；未部署 Collector 时禁止后台推送线程。
        enabled: ${SERVICEOS_OTLP_METRICS_ENABLED:false}

logging:
  structured:
    format:
      console: ${SERVICEOS_LOG_FORMAT:ecs}
    ecs:
      service:
        environment: ${SERVICEOS_ENVIRONMENT:local}
        node-name: ${SERVICEOS_NODE_NAME:local}
    json:
      customizer: com.serviceos.bootstrap.SensitiveLogJsonCustomizer
      stacktrace:
        max-length: 8192
        max-throwable-depth: 20

server:
  shutdown: graceful

serviceos:
  observability:
    # 生产默认 false；仅当 Prometheus 位于受控私网且入口层已隔离时才允许匿名抓取。
    allow-anonymous-metrics: ${SERVICEOS_ALLOW_ANONYMOUS_METRICS:false}
  integration:
    byd:
      cpim:
        # 生产必须由 Secret Manager/环境变量注入，禁止把真实车企密钥提交到仓库。
        app-key: ${SERVICEOS_BYD_CPIM_APP_KEY:local-byd-app-key}
        app-secret: ${SERVICEOS_BYD_CPIM_APP_SECRET:local-byd-app-secret-change-me}
        allowed-clock-skew: ${SERVICEOS_BYD_CPIM_ALLOWED_CLOCK_SKEW:PT5M}
  files:
    # 参考工程默认使用私有本地沙箱；生产部署必须切换为受管对象存储适配器和专业扫描服务。
    storage: ${SERVICEOS_FILE_STORAGE:local-private}
    scanner: ${SERVICEOS_FILE_SCANNER:local-eicar}
    maximum-size-bytes: ${SERVICEOS_FILE_MAXIMUM_SIZE:52428800}
    upload-session-lifetime: ${SERVICEOS_FILE_SESSION_LIFETIME:PT1H}
    upload-authorization-lifetime: ${SERVICEOS_FILE_UPLOAD_AUTH_LIFETIME:PT15M}
    download-authorization-lifetime: ${SERVICEOS_FILE_DOWNLOAD_AUTH_LIFETIME:PT5M}
    finalization-lease: ${SERVICEOS_FILE_FINALIZATION_LEASE:PT2M}
    local:
      root: ${SERVICEOS_FILE_LOCAL_ROOT:${java.io.tmpdir}/serviceos-private-files}
      signing-key: ${SERVICEOS_FILE_LOCAL_SIGNING_KEY:local-development-key-change-before-production-32bytes}
      transfer-base-url: ${SERVICEOS_FILE_TRANSFER_BASE_URL:http://localhost:8080/api/v1/file-transfers}
